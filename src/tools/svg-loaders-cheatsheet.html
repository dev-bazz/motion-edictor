<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Loader Cheat Sheet — bazz-motion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bazz-motion-color: #00e5ff;
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --text: #e2e2f0;
  --muted: #555570;
  --accent: var(--bazz-motion-color);
  --preview-bg: #0d0d14;
  --preview-bg-light: #f0f4ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 40px 24px 80px;
}

header {
  max-width: 1100px;
  margin: 0 auto 40px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 28px;
}

.eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}

h1 {
  font-family: 'Space Mono', monospace;
  font-size: clamp(22px, 4vw, 38px);
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 12px;
}

.subtitle {
  color: var(--muted);
  font-size: 14px;
  max-width: 600px;
  line-height: 1.65;
}

.subtitle code {
  font-family: monospace;
  color: var(--accent);
  background: rgba(0,229,255,.08);
  padding: 1px 7px;
  border-radius: 4px;
}

/* ── Controls ─────────────────────────────────────────── */
.controls {
  max-width: 1100px;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.controls-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.pill code {
  color: var(--accent);
  background: rgba(0,229,255,.07);
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
}

.pill input[type=color] {
  width: 28px; height: 28px;
  border: none; border-radius: 5px;
  cursor: pointer; background: none; padding: 0;
}

.pill input[type=range] {
  width: 90px;
  accent-color: var(--accent);
  cursor: pointer;
}

.pill-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  transition: border-color .18s, color .18s;
  white-space: nowrap;
}

.pill-btn:hover { border-color: #2e2e48; color: var(--text); }
.pill-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.06); }

.search-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text);
  outline: none;
  width: 200px;
  transition: border-color .2s;
}
.search-box::placeholder { color: var(--muted); }
.search-box:focus { border-color: var(--accent); }

.count-badge {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  white-space: nowrap;
}
.count-badge span { color: var(--accent); font-weight: 700; }

/* ── Category chips ───────────────────────────────────── */
.cat-row {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
}

.cat-chip {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
  letter-spacing: .04em;
}
.cat-chip:hover { border-color: #2e2e48; color: var(--text); }
.cat-chip.active {
  background: rgba(0,229,255,.1);
  border-color: rgba(0,229,255,.4);
  color: var(--accent);
}

/* ── Grid / Cards ─────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
  gap: 15px;
  max-width: 1100px;
  margin: 0 auto;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s, transform .15s;
}
.card:hover { border-color: #2e2e48; transform: translateY(-2px); }
.card.hidden { display: none; }

.preview {
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--preview-bg);
  transition: background .3s;
  position: relative;
  overflow: hidden;
}
.preview.light-bg { background: var(--preview-bg-light); }

.card-body { padding: 13px; }

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3px;
}

.card-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}

.cat-tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(0,229,255,.07);
  color: var(--accent);
  opacity: .7;
  letter-spacing: .05em;
}

.card-desc {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 11px;
  line-height: 1.5;
}

.btn-row { display: flex; gap: 6px; }

.copy-btn {
  flex: 1;
  background: rgba(0,229,255,.06);
  border: 1px solid rgba(0,229,255,.13);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .18s, border-color .18s;
  letter-spacing: .05em;
}
.copy-btn:hover { background: rgba(0,229,255,.12); border-color: rgba(0,229,255,.3); }
.copy-btn.copied { background: rgba(0,229,255,.18); color: #fff; border-color: rgba(0,229,255,.4); }

.jsx-btn {
  background: rgba(138,92,246,.08);
  border: 1px solid rgba(138,92,246,.2);
  color: #a78bfa;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .18s, border-color .18s;
  letter-spacing: .05em;
  white-space: nowrap;
}
.jsx-btn:hover { background: rgba(138,92,246,.15); border-color: rgba(138,92,246,.35); }
.jsx-btn.copied { background: rgba(138,92,246,.2); color: #fff; }

/* ── Usage snippet panel ──────────────────────────────── */
.usage-panel {
  max-width: 1100px;
  margin: 0 auto 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.usage-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
}

.usage-code {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #94d3ac;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  flex: 1;
  min-width: 200px;
  white-space: pre;
  overflow-x: auto;
}

/* ── Download / Fav / Technique / Toast ─────────────── */
.dl-btn {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .18s, color .18s;
}
.dl-btn:hover { background: rgba(255,255,255,.09); color: var(--text); }

.fav-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  padding: 5px 7px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .18s;
  line-height: 1;
}
.fav-btn:hover { border-color: #f6ad55; }
.fav-btn.starred { color: #f6ad55; border-color: rgba(246,173,85,.4); background: rgba(246,173,85,.08); }

.tech-badge {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: .03em;
  opacity: .65;
  flex-shrink: 0;
}
.tech-css  { background: rgba(139,92,246,.15); color: #a78bfa; }
.tech-smil { background: rgba(52,211,153,.12);  color: #6ee7b7; }
.tech-both { background: rgba(251,146,60,.1);   color: #fb923c; }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #14141f;
  border: 1px solid rgba(0,229,255,.5);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 10px 26px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity .22s, transform .22s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,229,255,.12);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.pill-btn.fav-filter.active { border-color: #f6ad55; color: #f6ad55; background: rgba(246,173,85,.08); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">// bazz-motion</div>
  <h1>SVG Loader<br>Cheat Sheet</h1>
  <p class="subtitle">50 copy-ready SVG loaders, all themed with <code>--bazz-motion-color</code>. Animations are self-contained — paste and go.</p>
</header>

<!-- Usage panel -->
<div class="usage-panel">
  <span class="usage-label">Usage</span>
  <code class="usage-code">&lt;div style="--bazz-motion-color: #00e5ff"&gt; ... paste SVG here ... &lt;/div&gt;</code>
</div>

<!-- Controls -->
<div class="controls">
  <div class="controls-row">
    <!-- Color picker -->
    <div class="pill">
      <span>color</span>
      <code>--bazz-motion-color</code>
      <input type="color" id="colorPicker" value="#00e5ff" oninput="updateColor(this.value)">
    </div>

    <!-- Speed -->
    <div class="pill">
      <span>speed</span>
      <input type="range" id="speedSlider" min="25" max="300" value="100" oninput="updateSpeed(this.value)">
      <span id="speedLabel" style="min-width:34px">1×</span>
    </div>

    <!-- Pause/Play -->
    <button class="pill-btn" id="pauseBtn" onclick="togglePause()">⏸ pause all</button>

    <!-- BG toggle -->
    <button class="pill-btn" id="bgBtn" onclick="toggleBg()">☀ light bg</button>

    <!-- Size -->
    <button class="pill-btn" id="sizeBtn" onclick="toggleSize()">⊞ large</button>

    <!-- Favorites filter -->
    <button class="pill-btn fav-filter" id="favBtn" onclick="toggleFavFilter()">☆ favorites</button>

    <!-- Search -->
    <input class="search-box" type="text" placeholder="🔍 search loaders…" oninput="filterCards(this.value)">

    <!-- Count -->
    <div class="count-badge">Showing <span id="visibleCount">60</span> / <span id="totalCount">60</span></div>
  </div>

  <!-- Category chips -->
  <div class="cat-row" id="catRow">
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">filter:</span>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  LOADER DEFINITIONS  (50 total)
// ═══════════════════════════════════════════════════════════════
const L = [

// ── RINGS ──────────────────────────────────────────────────────
{cat:"rings", name:"Spinning Ring", desc:"Classic single-stroke ring", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50" style="--bazz-motion-color:#00e5ff">
  <circle cx="25" cy="25" r="20" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="4" stroke-linecap="round" stroke-dasharray="80 40"
    style="transform-origin:center;animation:bm-spin 1s linear infinite"/>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

{cat:"rings", name:"Dash Spinner", desc:"Animated stroke draw-and-erase", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50" style="--bazz-motion-color:#00e5ff">
  <circle cx="25" cy="25" r="20" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="4" stroke-linecap="round"
    style="transform-origin:center;animation:bm-spin 1.4s linear infinite,bm-dash 1.4s ease-in-out infinite"/>
  <style>
    @keyframes bm-spin{to{transform:rotate(360deg)}}
    @keyframes bm-dash{0%{stroke-dasharray:1 150;stroke-dashoffset:0}50%{stroke-dasharray:90 150;stroke-dashoffset:-35}100%{stroke-dasharray:90 150;stroke-dashoffset:-124}}
  </style>
</svg>`},

{cat:"rings", name:"Dual Ring", desc:"Two rings counter-rotating", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <circle cx="30" cy="30" r="22" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="3" stroke-dasharray="70 30" stroke-linecap="round"
    style="animation:bm-spf 1s linear infinite;transform-origin:center"/>
  <circle cx="30" cy="30" r="13" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="3" stroke-dasharray="40 20" stroke-linecap="round" opacity=".5"
    style="animation:bm-spr 1.5s linear infinite;transform-origin:center"/>
  <style>
    @keyframes bm-spf{to{transform:rotate(360deg)}}
    @keyframes bm-spr{to{transform:rotate(-360deg)}}
  </style>
</svg>`},

{cat:"rings", name:"Triple Ring", desc:"Three nested rings at staggered speeds", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 70 70" style="--bazz-motion-color:#00e5ff">
  <circle cx="35" cy="35" r="30" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="2.5" stroke-dasharray="90 40" stroke-linecap="round"
    style="animation:bm-spf .9s linear infinite;transform-origin:center"/>
  <circle cx="35" cy="35" r="21" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="2.5" stroke-dasharray="60 28" stroke-linecap="round" opacity=".6"
    style="animation:bm-spr 1.3s linear infinite;transform-origin:center"/>
  <circle cx="35" cy="35" r="11" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="2.5" stroke-dasharray="30 14" stroke-linecap="round" opacity=".3"
    style="animation:bm-spf 1.7s linear infinite;transform-origin:center"/>
  <style>
    @keyframes bm-spf{to{transform:rotate(360deg)}}
    @keyframes bm-spr{to{transform:rotate(-360deg)}}
  </style>
</svg>`},

{cat:"rings", name:"Dotted Ring", desc:"Rotating dotted circle border", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 52 52" style="--bazz-motion-color:#00e5ff">
  <circle cx="26" cy="26" r="21" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="4" stroke-dasharray="3 9" stroke-linecap="round"
    style="animation:bm-spin 1.2s linear infinite;transform-origin:center"/>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

{cat:"rings", name:"Conic Ring", desc:"Gradient opacity-fade spinner", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 52 52" style="--bazz-motion-color:#00e5ff">
  <defs>
    <linearGradient id="bm-cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--bazz-motion-color)" stop-opacity="0"/>
      <stop offset="100%" stop-color="var(--bazz-motion-color)" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <circle cx="26" cy="26" r="20" fill="none" stroke="url(#bm-cg)"
    stroke-width="5" stroke-linecap="round"
    style="animation:bm-spin 1s linear infinite;transform-origin:center"/>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

{cat:"rings", name:"Comet Ring", desc:"A comet tail chasing round a ring", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 54 54" style="--bazz-motion-color:#00e5ff">
  <circle cx="27" cy="27" r="21" fill="none" stroke="var(--bazz-motion-color)" stroke-width="2" opacity=".15"/>
  <circle cx="27" cy="27" r="21" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="4" stroke-linecap="round" stroke-dasharray="12 120"
    style="animation:bm-spin 1.2s cubic-bezier(.6,0,.4,1) infinite;transform-origin:center"/>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

{cat:"rings", name:"Arc Loader", desc:"Growing arc that sweeps then resets", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 54 54" style="--bazz-motion-color:#00e5ff">
  <circle cx="27" cy="27" r="21" fill="none" stroke="var(--bazz-motion-color)" stroke-width="1.5" opacity=".15"/>
  <circle cx="27" cy="27" r="21" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="5" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="-90 27 27" to="270 27 27" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dasharray"
      values="1 132;110 132;110 132" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset"
      values="0;-20;-132" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>`},

{cat:"rings", name:"Spinner Classic", desc:"Segmented disc with opacity trail", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 54 54" style="--bazz-motion-color:#00e5ff">
  <g style="animation:bm-spin 1s linear infinite;transform-origin:27px 27px">
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity="1"   transform="rotate(0   27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".88" transform="rotate(45  27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".75" transform="rotate(90  27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".6"  transform="rotate(135 27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".45" transform="rotate(180 27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".3"  transform="rotate(225 27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".18" transform="rotate(270 27 27)"/>
    <rect x="24" y="2"  width="6" height="14" rx="3" fill="var(--bazz-motion-color)" opacity=".08" transform="rotate(315 27 27)"/>
  </g>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

{cat:"rings", name:"Neon Glow Ring", desc:"Spinning ring with SVG blur glow", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <defs>
    <filter id="bm-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="30" cy="30" r="22" fill="none" stroke="var(--bazz-motion-color)" stroke-width="2" opacity=".2"/>
  <circle cx="30" cy="30" r="22" fill="none" stroke="var(--bazz-motion-color)"
    stroke-width="4" stroke-linecap="round" stroke-dasharray="40 98" filter="url(#bm-glow)"
    style="animation:bm-spin 1.2s linear infinite;transform-origin:30px 30px"/>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

// ── DOTS ───────────────────────────────────────────────────────
{cat:"dots", name:"Dot Bounce", desc:"Three bouncing dots in sequence", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="70" height="30" viewBox="0 0 70 30" style="--bazz-motion-color:#00e5ff">
  <circle cx="10" cy="18" r="7" fill="var(--bazz-motion-color)">
    <animate attributeName="cy" values="18;8;18" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="18" r="7" fill="var(--bazz-motion-color)">
    <animate attributeName="cy" values="18;8;18" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="18" r="7" fill="var(--bazz-motion-color)">
    <animate attributeName="cy" values="18;8;18" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
</svg>`},

{cat:"dots", name:"Five Dots", desc:"Five cascading bouncing dots", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="30" viewBox="0 0 100 30" style="--bazz-motion-color:#00e5ff">

  <circle cx="64" cy="18" r="6" fill="var(--bazz-motion-color)"><animate attributeName="cy" values="18;8;18" dur="1.2s" begin="0.36s" repeatCount="indefinite"/></circle>
  <circle cx="82" cy="18" r="6" fill="var(--bazz-motion-color)"><animate attributeName="cy" values="18;8;18" dur="1.2s" begin="0.48s" repeatCount="indefinite"/></circle>

{cat:"dots", name:"Chase Dots", desc:"Six fading dots orbiting a center", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 100 100" style="--bazz-motion-color:#00e5ff">

{cat:"dots", name:"Elastic Dots", desc:"Dots that squash and stretch", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="36" viewBox="0 0 80 36" style="--bazz-motion-color:#00e5ff">
  <circle cx="12" cy="18" r="8" fill="var(--bazz-motion-color)"

  <style>@keyframes bm-elastic{0%,100%{transform:scaleY(1) scaleX(1)}30%{transform:scaleY(1.6) scaleX(.7)}60%{transform:scaleY(.8) scaleX(1.1)}}</style>
</svg>`},

{cat:"dots", name:"Dot Flicker", desc:"Three dots flickering size and opacity", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="70" height="28" viewBox="0 0 70 28" style="--bazz-motion-color:#00e5ff">
  <circle cx="12" cy="14" r="8" fill="var(--bazz-motion-color)">
    <animate attributeName="opacity" values="1;.15;1" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="8;4;8"   dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="14" r="8" fill="var(--bazz-motion-color)">
    <animate attributeName="opacity" values="1;.15;1" dur="1.4s" begin=".25s" repeatCount="indefinite"/>

  </circle>
  <circle cx="58" cy="14" r="8" fill="var(--bazz-motion-color)">

  </circle>
</svg>`},

{cat:"dots", name:"Grid Fade", desc:"3×3 dot grid diagonal cascade", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <circle cx="10" cy="10" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin="0s"   repeatCount="indefinite"/></circle>

  <circle cx="50" cy="10" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".2s"  repeatCount="indefinite"/></circle>
  <circle cx="10" cy="30" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".1s"  repeatCount="indefinite"/></circle>
  <circle cx="30" cy="30" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".2s"  repeatCount="indefinite"/></circle>
  <circle cx="50" cy="30" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".3s"  repeatCount="indefinite"/></circle>
  <circle cx="10" cy="50" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".2s"  repeatCount="indefinite"/></circle>
  <circle cx="30" cy="50" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".3s"  repeatCount="indefinite"/></circle>
  <circle cx="50" cy="50" r="6" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" begin=".4s"  repeatCount="indefinite"/></circle>
</svg>`},

{cat:"dots", name:"Orbit Dot", desc:"A dot orbiting a fixed nucleus", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <circle cx="30" cy="30" r="6" fill="var(--bazz-motion-color)" opacity=".4"/>
  <circle cx="30" cy="30" r="22" fill="none" stroke="var(--bazz-motion-color)" stroke-width="1" opacity=".15"/>
  <circle cx="30" cy="8" r="5" fill="var(--bazz-motion-color)">
    <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>`},

// ── BARS ───────────────────────────────────────────────────────
{cat:"bars", name:"Wave Bars", desc:"Five equalizer-style animated bars", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="50" viewBox="0 0 60 50" style="--bazz-motion-color:#00e5ff">
  <rect x="2"  y="10" width="8" height="30" rx="4" fill="var(--bazz-motion-color)">
    <animate attributeName="height" values="10;30;10" dur="1s" begin="0s"   repeatCount="indefinite"/>
    <animate attributeName="y"      values="30;10;30" dur="1s" begin="0s"   repeatCount="indefinite"/>
  </rect>
  <rect x="14" y="10" width="8" height="30" rx="4" fill="var(--bazz-motion-color)">
    <animate attributeName="height" values="10;30;10" dur="1s" begin=".1s"  repeatCount="indefinite"/>
    <animate attributeName="y"      values="30;10;30" dur="1s" begin=".1s"  repeatCount="indefinite"/>
  </rect>
  <rect x="26" y="10" width="8" height="30" rx="4" fill="var(--bazz-motion-color)">
    <animate attributeName="height" values="10;30;10" dur="1s" begin=".2s"  repeatCount="indefinite"/>
    <animate attributeName="y"      values="30;10;30" dur="1s" begin=".2s"  repeatCount="indefinite"/>
  </rect>
  <rect x="38" y="10" width="8" height="30" rx="4" fill="var(--bazz-motion-color)">
    <animate attributeName="height" values="10;30;10" dur="1s" begin=".3s"  repeatCount="indefinite"/>
    <animate attributeName="y"      values="30;10;30" dur="1s" begin=".3s"  repeatCount="indefinite"/>
  </rect>
  <rect x="50" y="10" width="8" height="30" rx="4" fill="var(--bazz-motion-color)">
    <animate attributeName="height" values="10;30;10" dur="1s" begin=".4s"  repeatCount="indefinite"/>
    <animate attributeName="y"      values="30;10;30" dur="1s" begin=".4s"  repeatCount="indefinite"/>
  </rect>
</svg>`},

{cat:"bars", name:"Bars Grow", desc:"Seven bars growing from baseline", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="50" viewBox="0 0 80 50" style="--bazz-motion-color:#00e5ff">
  <rect x="2"  width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin="0s"    repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin="0s"    repeatCount="indefinite"/></rect>
  <rect x="13" width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin=".08s"  repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin=".08s"  repeatCount="indefinite"/></rect>
  <rect x="24" width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin=".16s"  repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin=".16s"  repeatCount="indefinite"/></rect>
  <rect x="35" width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin=".24s"  repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin=".24s"  repeatCount="indefinite"/></rect>
  <rect x="46" width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin=".32s"  repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin=".32s"  repeatCount="indefinite"/></rect>
  <rect x="57" width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin=".4s"   repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin=".4s"   repeatCount="indefinite"/></rect>
  <rect x="68" width="7" rx="3" fill="var(--bazz-motion-color)"><animate attributeName="height" values="10;50;10" dur="1.1s" begin=".48s"  repeatCount="indefinite"/><animate attributeName="y" values="40;0;40" dur="1.1s" begin=".48s"  repeatCount="indefinite"/></rect>
</svg>`},

{cat:"bars", name:"Stretch Bar", desc:"Horizontally stretching progress bar", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="90" height="20" viewBox="0 0 90 20" style="--bazz-motion-color:#00e5ff">
  <rect x="0" y="6" width="90" height="8" rx="4" fill="var(--bazz-motion-color)" opacity=".15"/>
  <rect y="6" height="8" rx="4" fill="var(--bazz-motion-color)">
    <animate attributeName="x"     values="0;45;90"  dur="1.3s" repeatCount="indefinite" keyTimes="0;.5;1" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="width" values="5;45;5"   dur="1.3s" repeatCount="indefinite" keyTimes="0;.5;1" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
</svg>`},

{cat:"bars", name:"Indeterminate Bar", desc:"Material-style sliding progress", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="14" viewBox="0 0 100 14" style="--bazz-motion-color:#00e5ff">
  <rect x="0" y="4" width="100" height="6" rx="3" fill="var(--bazz-motion-color)" opacity=".15"/>
  <rect y="4" height="6" rx="3" fill="var(--bazz-motion-color)">
    <animate attributeName="x"     dur="1.6s" repeatCount="indefinite" values="-40;80;100"/>
    <animate attributeName="width" dur="1.6s" repeatCount="indefinite" values="40;40;0"/>
  </rect>
</svg>`},

{cat:"bars", name:"Signal Bars", desc:"Mobile signal bars cycling", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50" style="--bazz-motion-color:#00e5ff">
  <rect x="2"  y="34" width="9" height="14" rx="2" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".2;1;.2" dur="2s" begin="0s"  repeatCount="indefinite"/></rect>
  <rect x="14" y="26" width="9" height="22" rx="2" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".2;1;.2" dur="2s" begin=".2s" repeatCount="indefinite"/></rect>
  <rect x="26" y="16" width="9" height="32" rx="2" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".2;1;.2" dur="2s" begin=".4s" repeatCount="indefinite"/></rect>
  <rect x="38" y="4"  width="9" height="44" rx="2" fill="var(--bazz-motion-color)"><animate attributeName="opacity" values=".2;1;.2" dur="2s" begin=".6s" repeatCount="indefinite"/></rect>
</svg>`},

{cat:"bars", name:"Skeleton Lines", desc:"Shimmer skeleton placeholder", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="110" height="60" viewBox="0 0 110 60" style="--bazz-motion-color:#00e5ff">
  <defs>
    <linearGradient id="bm-shim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="var(--bazz-motion-color)" stop-opacity=".05"/>
      <stop offset="50%"  stop-color="var(--bazz-motion-color)" stop-opacity=".3"/>
      <stop offset="100%" stop-color="var(--bazz-motion-color)" stop-opacity=".05"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="2 0" dur="1.5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="8"  width="110" height="10" rx="5" fill="url(#bm-shim)"/>
  <rect x="0" y="26" width="80"  height="10" rx="5" fill="url(#bm-shim)"/>
  <rect x="0" y="44" width="95"  height="10" rx="5" fill="url(#bm-shim)"/>
</svg>`},

{cat:"bars", name:"EKG Line", desc:"Electrocardiogram stroke animation", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="110" height="40" viewBox="0 0 110 40" style="--bazz-motion-color:#00e5ff">
  <polyline points="0,20 18,20 24,8 30,32 36,8 42,20 60,20 66,8 72,32 78,8 84,20 110,20"
    fill="none" stroke="var(--bazz-motion-color)" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="220" stroke-dashoffset="220">
    <animate attributeName="stroke-dashoffset" from="220" to="-220" dur="2s" repeatCount="indefinite"/>
  </polyline>
</svg>`},

{cat:"bars", name:"Typing Cursor", desc:"Blinking text insert cursor", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="50" viewBox="0 0 14 50" style="--bazz-motion-color:#00e5ff">
  <rect x="3" y="5" width="8" height="40" rx="2" fill="var(--bazz-motion-color)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
</svg>`},

// ── PULSE ──────────────────────────────────────────────────────
{cat:"pulse", name:"Pulse", desc:"Breathing circle scale pulse", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50" style="--bazz-motion-color:#00e5ff">
  <circle cx="25" cy="25" fill="var(--bazz-motion-color)">
    <animate attributeName="r"       values="18;14;18" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;.3;1"   dur="1.4s" repeatCount="indefinite"/>
  </circle>
</svg>`},

{cat:"pulse", name:"Ripple", desc:"Concentric expanding ripple rings", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" style="--bazz-motion-color:#00e5ff">
  <circle cx="40" cy="40" r="6" fill="var(--bazz-motion-color)"/>
  <circle cx="40" cy="40" fill="none" stroke="var(--bazz-motion-color)" stroke-width="2.5">
    <animate attributeName="r"       values="6;36"  dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0"   dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="40" fill="none" stroke="var(--bazz-motion-color)" stroke-width="2.5">
    <animate attributeName="r"       values="6;36"  dur="2s" begin=".65s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0"   dur="2s" begin=".65s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="40" fill="none" stroke="var(--bazz-motion-color)" stroke-width="2.5">
    <animate attributeName="r"       values="6;36"  dur="2s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0"   dur="2s" begin="1.3s" repeatCount="indefinite"/>
  </circle>
</svg>`},

{cat:"pulse", name:"Ping", desc:"Radar-style expanding ping", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <circle cx="30" cy="30" r="8" fill="var(--bazz-motion-color)"/>
  <circle cx="30" cy="30" fill="var(--bazz-motion-color)">
    <animate attributeName="r"       values="8;28"   dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".8;0"   dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>`},

{cat:"pulse", name:"Heartbeat", desc:"Double-pulse beating heart", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 100 100" style="--bazz-motion-color:#00e5ff">

    style="animation:bm-hb 1.5s ease-in-out infinite;transform-origin:50px 50px"

{cat:"pulse", name:"WiFi Pulse", desc:"WiFi arcs lighting up outward", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="50" viewBox="0 0 60 50" style="--bazz-motion-color:#00e5ff">

</svg>`},

// ── SHAPES ─────────────────────────────────────────────────────
{cat:"shapes", name:"Square Spin", desc:"Rotating square with scale/fade", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">

</svg>`},

{cat:"shapes", name:"Triangle Spinner", desc:"Rotating outlined triangle", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" style="--bazz-motion-color:#00e5ff">

</svg>`},

{cat:"shapes", name:"Diamond Flip", desc:"Diamond flipping on its axis", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" style="--bazz-motion-color:#00e5ff">

</svg>`},

{cat:"shapes", name:"Infinity Loop", desc:"Rotating ∞ path with stroke trail", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="90" height="46" viewBox="0 0 90 46" style="--bazz-motion-color:#00e5ff">

    style="animation:bm-inf 2.5s linear infinite"/>

</svg>`},

{cat:"shapes", name:"Spiral", desc:"Three concentric rings spinning", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <path d="M30,30 m0,-22 a22,22 0 1 1 -0.01,0 M30,30 m0,-15 a15,15 0 1 1 -0.01,0 M30,30 m0,-8 a8,8 0 1 1 -0.01,0"

  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

{cat:"shapes", name:"Neon Cross", desc:"Spinning cross beams with glow", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" style="--bazz-motion-color:#00e5ff">
  <defs>
    <filter id="bm-glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g style="animation:bm-spin 2s linear infinite;transform-origin:30px 30px" filter="url(#bm-glow2)">
    <line x1="30" y1="4"  x2="30" y2="56" stroke="var(--bazz-motion-color)" stroke-width="5" stroke-linecap="round"/>
    <line x1="4"  y1="30" x2="56" y2="30" stroke="var(--bazz-motion-color)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <style>@keyframes bm-spin{to{transform:rotate(360deg)}}</style>
</svg>`},

  <ellipse cx="26" cy="70" rx="19" ry="1" fill="none" stroke="var(--bazz-motion-color)" stroke-width="3"><animate attributeName="ry" values="1;4;1" dur="2s" repeatCount="indefinite"/></ellipse>
</svg>`},

  <g style="animation:bm-spin 3s linear infinite;transform-origin:32px 32px">

    <line x1="35" y1="52" x2="35" y2="66" stroke="var(--bazz-motion-color)" stroke-width="3" stroke-linecap="round"/>
    <line x1="4"  y1="35" x2="18" y2="35" stroke="var(--bazz-motion-color)" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="35" x2="66" y2="35" stroke="var(--bazz-motion-color)" stroke-width="3" stroke-linecap="round"/>

{cat:"mechanical", name:"Pendulum", desc:"Swinging pendulum on a pivot", svg:`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="70" viewBox="0 0 60 70" style="--bazz-motion-color:#00e5ff">

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let paused    = false;
let lightBg   = false;
let largeSize = false;
let activecat = 'all';
let searchQ   = '';
const SPEED_BASE = 1.0; // multiplier

// ═══════════════════════════════════════════════════════════════
//  BUILD CATEGORY CHIPS
// ═══════════════════════════════════════════════════════════════
const cats = ['all', ...new Set(L.map(l => l.cat))];
const catLabels = {all:'All', rings:'Rings', dots:'Dots', bars:'Bars', pulse:'Pulse', shapes:'Shapes', organic:'Organic', mechanical:'Mechanical', ui:'UI / Effects'};
const catRow = document.getElementById('catRow');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-chip' + (c === 'all' ? ' active' : '');
  btn.textContent = catLabels[c] || c;
  btn.dataset.cat = c;
  btn.onclick = () => {
    activecat = c;
    document.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
    applyFilter();
  };
  catRow.appendChild(btn);
});

// ═══════════════════════════════════════════════════════════════
//  RENDER CARDS
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function detectTech(svg) {
  const hasCSS  = /animation:/.test(svg);
  const hasSMIL = /<animate|<animateTransform/.test(svg);
  if (hasCSS && hasSMIL) return 'both';
  if (hasCSS)  return 'css';
  return 'smil';
}
const TECH_LABELS = { css:'CSS', smil:'SMIL', both:'CSS+SMIL' };

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1600);
}

// ── Favorites (localStorage) ────────────────────────────────
let favs = new Set(JSON.parse(localStorage.getItem('bm-favs') || '[]'));
function saveFavs() { localStorage.setItem('bm-favs', JSON.stringify([...favs])); }
let showFavsOnly = false;

// ── SVG→JSX ─────────────────────────────────────────────────
function svgToJsx(svg) {
  return svg
    .replace(/class=/g,'className=')
    .replace(/stroke-width=/g,'strokeWidth=')
    .replace(/stroke-linecap=/g,'strokeLinecap=')
    .replace(/stroke-linejoin=/g,'strokeLinejoin=')
    .replace(/stroke-dasharray=/g,'strokeDasharray=')
    .replace(/stroke-dashoffset=/g,'strokeDashoffset=')
    .replace(/fill-opacity=/g,'fillOpacity=')
    .replace(/stop-color=/g,'stopColor=')
    .replace(/stop-opacity=/g,'stopOpacity=')
    .replace(/font-family=/g,'fontFamily=')
    .replace(/font-size=/g,'fontSize=')
    .replace(/font-weight=/g,'fontWeight=');
}

// ── Download SVG ─────────────────────────────────────────────
function downloadSvg(name, svg) {
  const blob = new Blob([svg.trim()], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.toLowerCase().replace(/\s+/g, '-') + '.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER CARDS
// ═══════════════════════════════════════════════════════════════
const grid = document.getElementById('grid');
document.getElementById('visibleCount').textContent = L.length;
document.getElementById('totalCount').textContent   = L.length;

L.forEach(loader => {
  const tech = detectTech(loader.svg);

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.name = loader.name.toLowerCase();
  card.dataset.cat  = loader.cat;

  // Preview
  const preview = document.createElement('div');
  preview.className = 'preview';
  preview.innerHTML = loader.svg;

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // Meta row: title + category tag + tech badge
  const meta = document.createElement('div');
  meta.className = 'card-meta';

  const titleWrap = document.createElement('div');
  titleWrap.style.cssText = 'display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-width:0';

  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = loader.name;

  const techBadge = document.createElement('span');
  techBadge.className = `tech-badge tech-${tech}`;
  techBadge.textContent = TECH_LABELS[tech];

  titleWrap.append(title, techBadge);

  const tag = document.createElement('span');
  tag.className = 'cat-tag';
  tag.textContent = catLabels[loader.cat] || loader.cat;
  tag.style.cursor = 'pointer';
  tag.title = 'Filter by category';
  tag.onclick = () => {
    activecat = loader.cat;
    document.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === loader.cat));
    applyFilter();
  };

  meta.append(titleWrap, tag);

  const desc = document.createElement('div');
  desc.className = 'card-desc';
  desc.textContent = loader.desc;

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  // Copy SVG
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '⌘ copy SVG';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(loader.svg.trim()).then(() => {
      copyBtn.textContent = '✓ copied!';
      copyBtn.classList.add('copied');
      showToast(`Copied "${loader.name}"`);
      setTimeout(() => { copyBtn.textContent = '⌘ copy SVG'; copyBtn.classList.remove('copied'); }, 1800);
    });
  };

  // Copy JSX
  const jsxBtn = document.createElement('button');
  jsxBtn.className = 'jsx-btn';
  jsxBtn.textContent = 'JSX';
  jsxBtn.title = 'Copy as React JSX (camelCase attributes)';
  jsxBtn.onclick = () => {
    navigator.clipboard.writeText(svgToJsx(loader.svg.trim())).then(() => {
      jsxBtn.textContent = '✓';
      jsxBtn.classList.add('copied');
      showToast(`Copied "${loader.name}" as JSX`);
      setTimeout(() => { jsxBtn.textContent = 'JSX'; jsxBtn.classList.remove('copied'); }, 1800);
    });
  };

  // Download SVG
  const dlBtn = document.createElement('button');
  dlBtn.className = 'dl-btn';
  dlBtn.textContent = '↓';
  dlBtn.title = `Download ${loader.name}.svg`;
  dlBtn.onclick = () => { downloadSvg(loader.name, loader.svg); showToast(`Downloaded ${loader.name}.svg`); };

  // Favorite
  const favBtnEl = document.createElement('button');
  favBtnEl.className = 'fav-btn' + (favs.has(loader.name) ? ' starred' : '');
  favBtnEl.textContent = favs.has(loader.name) ? '★' : '☆';
  favBtnEl.title = 'Favorite';
  favBtnEl.onclick = () => {
    if (favs.has(loader.name)) {
      favs.delete(loader.name);
      favBtnEl.classList.remove('starred');
      favBtnEl.textContent = '☆';
    } else {
      favs.add(loader.name);
      favBtnEl.classList.add('starred');
      favBtnEl.textContent = '★';
      showToast(`★ Saved "${loader.name}"`);
    }
    saveFavs();
    if (showFavsOnly) applyFilter();
  };
  card.dataset.name = loader.name.toLowerCase();

  btnRow.append(copyBtn, jsxBtn, dlBtn, favBtnEl);
  body.append(meta, desc, btnRow);
  card.append(preview, body);
  grid.appendChild(card);
});

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
function updateColor(val) {
  document.documentElement.style.setProperty('--bazz-motion-color', val);
  document.querySelectorAll('.preview svg').forEach(s => s.style.setProperty('--bazz-motion-color', val));
  document.querySelector('.usage-code').textContent =
    `<div style="--bazz-motion-color: ${val}"> ... paste SVG here ... </div>`;
}

function updateSpeed(pct) {
  const mult = pct / 100;
  document.getElementById('speedLabel').textContent = mult.toFixed(2).replace(/\.?0+$/, '') + '×';
  applySpeed(mult);
}

function applySpeed(mult) {
  document.querySelectorAll('.preview svg').forEach(svg => {
    // CSS animations — rewrite inline duration values
    svg.querySelectorAll('[style*="animation"]').forEach(el => {
      const orig = el.dataset.origStyle || el.getAttribute('style');
      if (!el.dataset.origStyle) el.dataset.origStyle = orig;
      const scaled = orig.replace(/(\d+\.?\d*)(s\b)/g, (_, n) => (parseFloat(n) / mult).toFixed(3) + 's');
      el.setAttribute('style', scaled + (paused ? ';animation-play-state:paused' : ''));
    });
    // SMIL dur
    svg.querySelectorAll('[dur]').forEach(el => {
      const origDur = el.dataset.origDur || el.getAttribute('dur');
      if (!el.dataset.origDur) el.dataset.origDur = origDur;
      const num = parseFloat(origDur);
      if (!isNaN(num)) el.setAttribute('dur', (num / mult).toFixed(3) + 's');
    });
    // SMIL begin (only numeric offsets)
    svg.querySelectorAll('[begin]').forEach(el => {
      const origBeg = el.dataset.origBeg || el.getAttribute('begin');
      if (!el.dataset.origBeg) el.dataset.origBeg = origBeg;
      if (/^-?\d/.test(origBeg)) {
        const num = parseFloat(origBeg);
        if (!isNaN(num)) el.setAttribute('begin', (num / mult).toFixed(3) + 's');
      }
    });
    // Keep SMIL paused if needed
    try {
      if (paused) svg.pauseAnimations && svg.pauseAnimations();
    } catch(e) {}
  });
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '▶ play all' : '⏸ pause all';
  btn.classList.toggle('active', paused);
  document.querySelectorAll('.preview svg').forEach(svg => {
    // CSS animations
    svg.querySelectorAll('[style]').forEach(el => {
      const s = el.style;
      if (s.animation || (el.getAttribute('style') || '').includes('animation')) {
        s.animationPlayState = paused ? 'paused' : 'running';
      }
    });
    // SMIL
    try {
      if (paused) svg.pauseAnimations && svg.pauseAnimations();
      else        svg.unpauseAnimations && svg.unpauseAnimations();
    } catch(e) {}
  });
}

function toggleBg() {
  lightBg = !lightBg;
  const btn = document.getElementById('bgBtn');
  btn.textContent = lightBg ? '🌑 dark bg' : '☀ light bg';
  btn.classList.toggle('active', lightBg);
  document.querySelectorAll('.preview').forEach(p => p.classList.toggle('light-bg', lightBg));
}

function toggleSize() {
  largeSize = !largeSize;
  const btn = document.getElementById('sizeBtn');
  btn.textContent = largeSize ? '⊟ normal' : '⊞ large';
  btn.classList.toggle('active', largeSize);
  document.querySelectorAll('.preview').forEach(p => {
    p.style.height = largeSize ? '160px' : '110px';
  });
  document.querySelectorAll('.preview svg').forEach(s => {
    s.style.transform = largeSize ? 'scale(1.5)' : '';
  });
}

function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  const btn = document.getElementById('favBtn');
  btn.textContent = showFavsOnly ? '★ favorites' : '☆ favorites';
  btn.classList.toggle('active', showFavsOnly);
  btn.classList.toggle('fav-filter', true);
  applyFilter();
}

function filterCards(q) {
  searchQ = q.toLowerCase();
  applyFilter();
}

function applyFilter() {
  const cards = document.querySelectorAll('.card');
  let n = 0;
  cards.forEach(c => {
    const nameMatch = !searchQ || c.dataset.name.includes(searchQ);
    const catMatch  = activecat === 'all' || c.dataset.cat === activecat;
    const favMatch  = !showFavsOnly || favs.has(c.querySelector('.card-title')?.textContent || '');
    const show = nameMatch && catMatch && favMatch;
    c.classList.toggle('hidden', !show);
    if (show) n++;
  });
  document.getElementById('visibleCount').textContent = n;
}
</script>
