<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradientForge Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d12;
  --surf:    #131318;
  --panel:   #1a1a22;
  --raised:  #22222e;
  --bdr:     rgba(255,255,255,0.07);
  --bdr2:    rgba(255,255,255,0.12);
  --text:    #f0f0f8;
  --muted:   #5c5c7a;
  --sub:     #8888aa;
  --accent:  #6c63ff;
  --accentH: #8b84ff;
  --green:   #2dd4a0;
  --red:     #ff5e6c;
  --yellow:  #ffd166;
  --blue:    #38bdf8;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
  --ui: 'Bricolage Grotesque', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease:   cubic-bezier(0.22,1,0.36,1);
  --lw: 288px; --rw: 360px; --hh: 52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ui);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
#app{display:grid;grid-template-rows:var(--hh) 1fr;grid-template-columns:var(--lw) 1fr var(--rw);grid-template-areas:"hdr hdr hdr" "lft ctr rgt";height:100%;overflow:hidden}

/* ── HEADER ── */
#hdr{grid-area:hdr;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--bdr);background:var(--surf);z-index:100;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-icon{width:28px;height:28px;border-radius:7px;background:conic-gradient(from 0deg,#6c63ff,#38bdf8,#2dd4a0,#ffd166,#ff5e6c,#6c63ff);animation:spin 5s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-0.3px;color:var(--text)}
.logo-text em{color:var(--accentH);font-style:normal}
.hdiv{width:1px;height:20px;background:var(--bdr);flex-shrink:0}
.hsp{flex:1}
.h-actions{display:flex;align-items:center;gap:8px}

/* type switcher */
.type-sw{display:flex;gap:3px;background:var(--panel);border:1px solid var(--bdr2);border-radius:var(--r-md);padding:3px}
.ts-btn{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:7px;background:transparent;border:none;color:var(--muted);font-family:var(--ui);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.ts-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.ts-btn.active{background:var(--raised);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.5)}
.ts-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.15)}

.icon-btn{width:32px;height:32px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--bdr);color:var(--sub);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--ui)}
.icon-btn:hover{color:var(--text);border-color:var(--bdr2);background:var(--panel)}
.icon-btn:disabled{opacity:.3;cursor:default}
.copy-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#fff;font-family:var(--ui);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.3px}
.copy-btn:hover{background:var(--accentH);transform:translateY(-1px)}

/* ── PANELS ── */
.panel{overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;height:calc(100vh - var(--hh))}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
#lft{grid-area:lft;border-right:1px solid var(--bdr);background:var(--surf)}
#ctr{grid-area:ctr;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;height:calc(100vh - var(--hh))}
#rgt{grid-area:rgt;border-left:1px solid var(--bdr);background:var(--surf);display:flex;flex-direction:column;height:calc(100vh - var(--hh))}

.section{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ── TRACK ── */
.track-wrap{position:relative;padding:22px 0 8px}
.gradient-track{height:32px;border-radius:8px;position:relative;cursor:crosshair;overflow:visible;box-shadow:0 0 0 1px rgba(255,255,255,.1) inset;background-image:linear-gradient(45deg,#333 25%,transparent 25%),linear-gradient(-45deg,#333 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#333 75%),linear-gradient(-45deg,transparent 75%,#333 75%);background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0;background-color:#1a1a22}
.track-layer{position:absolute;inset:0;border-radius:8px;pointer-events:none}
.track-hint{font-size:10px;color:var(--muted);margin-top:8px;text-align:center}
.stop-handle{position:absolute;top:-10px;width:16px;height:52px;transform:translateX(-50%);cursor:grab;z-index:10;display:flex;flex-direction:column;align-items:center}
.stop-handle:active{cursor:grabbing}
.sh-swatch{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.5);flex-shrink:0;transition:transform .1s var(--spring)}
.sh-needle{width:2px;height:32px;background:rgba(255,255,255,.8);margin-top:10px;pointer-events:none}
.stop-handle.sel .sh-swatch{transform:scale(1.25);border-color:#fff;box-shadow:0 0 0 2px var(--accent),0 2px 6px rgba(0,0,0,.5)}

/* ── STOP EDITOR ── */
.stop-ed{display:grid;grid-template-columns:48px 1fr 1fr 32px;gap:8px;align-items:center;padding:10px 16px 14px;border-bottom:1px solid var(--bdr);transition:opacity .2s}
.stop-ed.hidden{opacity:.3;pointer-events:none}
.stop-del-btn{width:32px;height:32px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--bdr);color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.stop-del-btn:hover{border-color:var(--red);color:var(--red);background:rgba(255,94,108,.08)}
.swatch-wrap{width:48px;height:48px;border-radius:var(--r-md);border:2px solid var(--bdr2);overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s}
.swatch-wrap:hover{border-color:var(--accent)}
.swatch-wrap input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);opacity:0;cursor:pointer}
.swatch-bg{width:100%;height:100%}
.field-g{display:flex;flex-direction:column;gap:4px}
.field-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.field-in{background:var(--panel);border:1px solid var(--bdr);border-radius:var(--r-sm);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;outline:none;transition:border-color .15s;width:100%}
.field-in:focus{border-color:var(--accent)}

/* ── CONTROLS ── */
.ctrl-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-lbl{font-size:11px;font-weight:600;color:var(--sub);min-width:72px;flex-shrink:0}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;outline:none;cursor:pointer;--prog:50%;background:linear-gradient(to right,var(--accent) var(--prog),var(--raised) var(--prog))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform .1s}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.2)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:grab}
.ctrl-val{font-family:var(--mono);font-size:11px;color:var(--accentH);min-width:38px;text-align:right;flex-shrink:0}
.angle-wrap{display:flex;align-items:center;gap:12px;flex:1}
.angle-dial{width:40px;height:40px;border-radius:50%;background:var(--panel);border:2px solid var(--bdr2);position:relative;cursor:grab;flex-shrink:0;transition:border-color .15s}
.angle-dial:active{cursor:grabbing;border-color:var(--accent)}
.angle-dial::before{content:'';position:absolute;top:50%;left:50%;width:3px;height:14px;background:var(--accentH);border-radius:2px;transform-origin:bottom center;margin-top:-14px;margin-left:-1.5px}
.angle-in{background:var(--panel);border:1px solid var(--bdr);border-radius:var(--r-sm);color:var(--accentH);font-family:var(--mono);font-size:12px;padding:6px 8px;width:56px;text-align:center;outline:none;transition:border-color .15s}
.angle-in:focus{border-color:var(--accent)}
.toggle-row{display:flex;gap:4px}
.chip{padding:5px 10px;border-radius:6px;background:var(--panel);border:1px solid var(--bdr);color:var(--sub);font-family:var(--ui);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.chip:hover{color:var(--text);border-color:var(--bdr2)}
.chip.active{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accentH)}
.sel-in{background:var(--panel);border:1px solid var(--bdr);border-radius:var(--r-sm);color:var(--text);font-family:var(--ui);font-size:12px;font-weight:600;padding:6px 10px;outline:none;cursor:pointer;transition:border-color .15s;flex:1}
.sel-in:focus{border-color:var(--accent)}
.type-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:8px;margin-bottom:14px}
.type-banner-icon{font-size:20px;line-height:1}
.type-banner-name{font-size:13px;font-weight:700;color:var(--accentH);text-transform:capitalize}
.type-banner-desc{font-size:11px;color:var(--muted);margin-top:1px}

/* ── PRESETS ── */
.presets-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.preset-card{border-radius:var(--r-md);aspect-ratio:1;cursor:pointer;position:relative;border:2px solid transparent;transition:all .15s var(--spring);overflow:hidden}
.preset-card:hover{transform:scale(1.06);border-color:rgba(255,255,255,.3)}
.preset-name{position:absolute;bottom:0;left:0;right:0;padding:4px 5px;font-size:8px;font-weight:700;text-align:center;background:rgba(0,0,0,.65);opacity:0;transition:opacity .15s;text-transform:uppercase;letter-spacing:.5px}
.preset-card:hover .preset-name{opacity:1}

/* ── MESH NODES ── */
.mesh-node-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;transition:background .1s;border:1px solid transparent}
.mesh-node-row:hover{background:rgba(255,255,255,.04)}
.mesh-node-row.sel{background:rgba(108,99,255,.1);border-color:rgba(108,99,255,.25)}
.mesh-node-row.drag-over{border-color:var(--accent);background:rgba(108,99,255,.15)}
.mesh-node-row.dragging{opacity:.4}
.drag-handle{width:16px;height:24px;display:flex;flex-direction:column;justify-content:center;gap:3px;cursor:grab;flex-shrink:0;opacity:.4;transition:opacity .15s}
.drag-handle:hover{opacity:1}
.drag-handle span{display:block;width:10px;height:2px;background:var(--sub);border-radius:1px}
.node-swatch{width:32px;height:32px;border-radius:7px;border:2px solid var(--bdr2);cursor:pointer;overflow:hidden;position:relative;flex-shrink:0}
.node-swatch input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);opacity:0;cursor:pointer}
.node-info{flex:1;min-width:0}
.node-color{font-family:var(--mono);font-size:11px;color:var(--accentH)}
.node-pos{font-size:10px;color:var(--muted);margin-top:2px}
.node-del{width:24px;height:24px;border-radius:4px;background:transparent;border:1px solid var(--bdr);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.node-del:hover{border-color:var(--red);color:var(--red)}
.add-btn{width:100%;padding:9px;background:transparent;border:1px dashed var(--bdr2);border-radius:var(--r-sm);color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--ui);font-weight:700;transition:all .15s;margin-top:4px;letter-spacing:.3px}
.add-btn:hover{border-color:var(--accent);color:var(--accentH);background:rgba(108,99,255,.06)}

/* ── CENTER / PREVIEW ── */
.prev-toolbar{height:44px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid var(--bdr);background:var(--surf);flex-shrink:0}
.ctx-btn{padding:5px 11px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--bdr);color:var(--sub);font-family:var(--ui);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.ctx-btn:hover{color:var(--text);border-color:var(--bdr2)}
.ctx-btn.active{color:var(--text);background:var(--raised);border-color:var(--bdr2)}
.pt-sp{flex:1}
.bg-chips{display:flex;gap:4px}
.bg-chip{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.bg-chip:hover,.bg-chip.active{border-color:#fff;transform:scale(1.15)}

/* preview stage */
.prev-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;overflow:hidden;position:relative}
.prev-stage::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
.prev-stage.mesh-mode{padding:0}
.prev-stage.mesh-mode::before{display:none}

/* preview contexts */
@keyframes prevIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.anim-in{animation:prevIn .35s var(--ease)}
.ctx-box{width:100%;max-width:520px;border-radius:var(--r-xl);box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);overflow:hidden;position:relative;z-index:1}
.ctx-rect{aspect-ratio:16/9}
.card-ctx{border-radius:var(--r-xl);overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);width:100%;max-width:400px;z-index:1;position:relative}
.card-hdr{padding:32px 28px 20px;min-height:160px;display:flex;flex-direction:column;justify-content:flex-end}
.card-hdr h2{font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.card-hdr p{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}
.card-body{background:var(--panel);padding:18px 28px;display:flex;gap:10px;align-items:center}
.card-avatar{width:36px;height:36px;border-radius:50%;background:var(--raised)}
.card-meta{font-size:13px;font-weight:600}
.card-sub{font-size:11px;color:var(--sub);margin-top:2px}
.btn-ctx{display:flex;flex-direction:column;align-items:center;gap:20px;z-index:1;position:relative}
.g-btn{padding:14px 32px;border-radius:50px;border:none;font-family:var(--ui);font-size:15px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:200px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.25)}
.g-icon-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:20px;display:flex;align-items:center;justify-content:center;color:#fff}
.text-ctx{text-align:center;max-width:480px;z-index:1;position:relative}
.g-text{font-size:clamp(36px,6vw,64px);font-weight:800;letter-spacing:-2px;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.g-sub{font-size:14px;color:var(--sub);margin-top:12px}
.border-ctx{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:1;position:relative}
.g-border-card{padding:24px 32px;background:var(--panel);border-radius:var(--r-xl);border:3px solid transparent;font-size:14px;color:var(--sub);text-align:center;max-width:320px;width:100%;line-height:1.5}
.g-border-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}

/* mesh canvas */
.mesh-bg{position:absolute;inset:0;z-index:0}
.mesh-cv{position:absolute;inset:0;cursor:crosshair;z-index:1}
.mesh-dot{position:absolute;width:20px;height:20px;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.5);transform:translate(-50%,-50%);cursor:grab;z-index:10;transition:box-shadow .1s}
.mesh-dot:active{cursor:grabbing}
.mesh-dot.sel{box-shadow:0 0 0 3px var(--accent),0 4px 12px rgba(0,0,0,.5)}
/* invisible hit-target */
.mesh-dot::after{content:'';position:absolute;inset:-8px;border-radius:50%}

/* ── RIGHT / CODE ── */
.code-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.code-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
.code-tab{padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:var(--ui);transition:all .15s;position:relative;border-right:1px solid var(--bdr)}
.code-tab:last-child{border-right:none}
.code-tab.active{color:var(--text);background:var(--panel)}
.code-tab.active::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green)}
.code-tab:hover:not(.active){color:var(--text)}
.code-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;min-height:0}
.code-body::-webkit-scrollbar{width:3px}
.code-body::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.code-block{font-family:var(--mono);font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.tok-prop{color:#79c0ff}.tok-fn{color:#d2a8ff}.tok-color{color:#ffa657}.tok-num{color:var(--green)}.tok-punc{color:var(--sub)}.tok-sel{color:var(--yellow)}.tok-comment{color:var(--muted);font-style:italic}
.copy-footer{padding:12px 16px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0}
.copy-main{flex:1;display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--raised);border-radius:var(--r-sm);cursor:pointer;transition:all .15s;border:1px solid var(--bdr);font-family:var(--ui);font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.5px}
.copy-main:hover{color:var(--text);border-color:var(--green)}
.copy-main.copied{color:var(--green);border-color:var(--green);background:rgba(45,212,160,.07)}
.history-sec{border-top:1px solid var(--bdr);flex-shrink:0;padding:12px 16px}
.history-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.history-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.history-row::-webkit-scrollbar{display:none}
.hswatch{width:32px;height:32px;border-radius:6px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:all .15s}
.hswatch:hover{transform:scale(1.1);border-color:rgba(255,255,255,.4)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--raised);border:1px solid var(--bdr2);border-radius:50px;padding:9px 18px;font-size:12px;font-weight:600;color:var(--text);opacity:0;transition:all .25s var(--spring);z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* responsive */
@media(max-width:1100px){:root{--rw:300px}.ts-label{display:none}}
@media(max-width:860px){
  :root{--lw:260px}
  #app{grid-template-columns:var(--lw) 1fr;grid-template-rows:var(--hh) 1fr auto;grid-template-areas:"hdr hdr" "lft ctr" "rgt rgt"}
  #rgt{border-left:none;border-top:1px solid var(--bdr);max-height:200px;flex-direction:row}
  .history-sec{display:none}
  .code-panel{flex:1}
}
@media(max-width:620px){
  #app{grid-template-columns:1fr;grid-template-rows:var(--hh) 1fr 52px;grid-template-areas:"hdr" "main" "nav"}
  #lft,#ctr,#rgt{grid-area:main;display:none}
  #lft.mob,#ctr.mob,#rgt.mob{display:flex;flex-direction:column}
  .mob-nav{display:grid!important}
  .type-sw{display:none}
}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:52px;background:var(--surf);border-top:1px solid var(--bdr);z-index:200;grid-template-columns:repeat(3,1fr)}
.mn-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:var(--ui);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:color .15s}
.mn-btn.active{color:var(--accentH)}
.mn-icon{font-size:18px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="app">

<!-- HEADER -->
<header id="hdr">
  <a class="logo" href="#">
    <div class="logo-icon"></div>
    <span class="logo-text">Gradient<em>Forge</em></span>
  </a>
  <div class="hdiv"></div>
  <div class="type-sw">
    <button class="ts-btn active" id="ts-conic"  onclick="setType('conic')">
      <span class="ts-dot" style="background:conic-gradient(from 0deg,#6c63ff,#38bdf8,#2dd4a0,#6c63ff)"></span>
      <span class="ts-label">Conic</span>
    </button>
    <button class="ts-btn" id="ts-linear" onclick="setType('linear')">
      <span class="ts-dot" style="background:linear-gradient(135deg,#6c63ff,#2dd4a0)"></span>
      <span class="ts-label">Linear</span>
    </button>
    <button class="ts-btn" id="ts-radial" onclick="setType('radial')">
      <span class="ts-dot" style="background:radial-gradient(circle,#ffd166,#ff5e6c 80%)"></span>
      <span class="ts-label">Radial</span>
    </button>
    <button class="ts-btn" id="ts-mesh"   onclick="setType('mesh')">
      <span class="ts-dot" style="background:linear-gradient(45deg,#2dd4a0,#6c63ff,#ff5e6c)"></span>
      <span class="ts-label">Mesh</span>
    </button>
  </div>
  <div class="hsp"></div>
  <div class="h-actions">
    <button class="icon-btn" id="btn-undo" onclick="undo()" title="Undo">↺</button>
    <button class="icon-btn" id="btn-redo" onclick="redo()" title="Redo">↻</button>
    <button class="icon-btn" onclick="randomize()" title="Randomize">⚄</button>
    <button class="copy-btn" onclick="copyCSS()"><span>⎘</span><span>Copy CSS</span></button>
  </div>
</header>

<!-- LEFT PANEL -->
<aside id="lft" class="panel mob">

  <div class="section">
    <div class="sec-label">Presets</div>
    <div class="presets-grid" id="presets-grid"></div>
  </div>

  <div class="section" id="track-section">
    <div class="sec-label">Gradient Track</div>
    <div class="track-wrap">
      <div class="gradient-track" id="gradient-track">
        <div class="track-layer" id="track-layer"></div>
      </div>
    </div>
    <div class="track-hint">Click to add stop · Drag handles · Dbl-click to remove</div>
  </div>

  <div class="stop-ed hidden" id="stop-ed">
    <div class="swatch-wrap">
      <div class="swatch-bg" id="swatch-bg"></div>
      <input type="color" id="stop-color" oninput="onStopColor(this.value)" onchange="onStopColor(this.value)">
    </div>
    <div class="field-g">
      <span class="field-lbl">Hex</span>
      <input class="field-in" id="stop-hex" type="text" placeholder="#ffffff" oninput="onStopHex(this.value)">
    </div>
    <div class="field-g">
      <span class="field-lbl">Position</span>
      <input class="field-in" id="stop-pos" type="number" min="0" max="100" oninput="onStopPos(+this.value)">
    </div>
    <button class="stop-del-btn" id="stop-del-btn" onclick="removeStop(S.selStop)" title="Remove stop">✕</button>
  </div>

  <div class="section" id="type-ctrl"></div>

</aside>

<!-- CENTER -->
<main id="ctr" class="mob">
  <div class="prev-toolbar">
    <button class="ctx-btn active" id="ctx-rect"   onclick="setCtx('rect')">Rectangle</button>
    <button class="ctx-btn"        id="ctx-card"   onclick="setCtx('card')">Card</button>
    <button class="ctx-btn"        id="ctx-button" onclick="setCtx('button')">Button</button>
    <button class="ctx-btn"        id="ctx-text"   onclick="setCtx('text')">Text</button>
    <button class="ctx-btn"        id="ctx-border" onclick="setCtx('border')">Border</button>
    <div class="pt-sp"></div>
    <div class="bg-chips">
      <div class="bg-chip active" style="background:#0d0d12"                                                                         data-bg="#0d0d12"  onclick="setBg(this)" title="Dark"></div>
      <div class="bg-chip"        style="background:#f5f5f5"                                                                         data-bg="#f5f5f5"  onclick="setBg(this)" title="Light"></div>
      <div class="bg-chip"        style="background:#fff;border:1px solid #ccc"                                                       data-bg="#ffffff"  onclick="setBg(this)" title="White"></div>
      <div class="bg-chip"        style="background:repeating-conic-gradient(#aaa 0% 25%,#eee 0% 50%) 0 0/16px 16px"               data-bg="checker"  onclick="setBg(this)" title="Checker"></div>
    </div>
  </div>
  <div class="prev-stage" id="prev-stage"></div>
</main>

<!-- RIGHT -->
<aside id="rgt" class="mob">
  <div class="code-panel">
    <div class="code-tabs">
      <button class="code-tab active" id="ctab-css"      onclick="setCodeTab('css')">CSS</button>
      <button class="code-tab"        id="ctab-scss"     onclick="setCodeTab('scss')">SCSS</button>
      <button class="code-tab"        id="ctab-react"    onclick="setCodeTab('react')">React</button>
      <button class="code-tab"        id="ctab-tailwind" onclick="setCodeTab('tailwind')">Tailwind</button>
      <button class="code-tab"        id="ctab-svg"      onclick="setCodeTab('svg')">SVG</button>
    </div>
    <div class="code-body">
      <div class="code-block" id="code-block"></div>
    </div>
  </div>
  <div class="copy-footer">
    <button class="copy-main" id="copy-main" onclick="copyCSS()">
      <span>⎘</span> COPY TO CLIPBOARD
    </button>
  </div>
  <div class="history-sec">
    <div class="history-lbl">Recent</div>
    <div class="history-row" id="history-row"></div>
  </div>
</aside>

</div>

<nav class="mob-nav" id="mob-nav">
  <button class="mn-btn" id="mn-ctrl" onclick="mobileTab('ctrl')"><span class="mn-icon">⚙</span>CONTROLS</button>
  <button class="mn-btn active" id="mn-prev" onclick="mobileTab('prev')"><span class="mn-icon">◉</span>PREVIEW</button>
  <button class="mn-btn" id="mn-code" onclick="mobileTab('code')"><span class="mn-icon">&lt;/&gt;</span>CODE</button>
</nav>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const S = {
  type: 'conic',
  // non-mesh gradient stops
  stops: [
    {color:'#6c63ff',pos:0},
    {color:'#38bdf8',pos:33},
    {color:'#2dd4a0',pos:66},
    {color:'#6c63ff',pos:100},
  ],
  selStop: 0,
  // conic
  angle:90, centerX:50, centerY:50, repeating:false,
  // linear
  linAngle:135, linRepeating:false,
  // radial
  radShape:'ellipse', radSize:'farthest-corner', radX:50, radY:50, radRepeating:false,
  // mesh
  meshNodes:[
    {x:15,y:15,color:'#6c63ff'},
    {x:75,y:10,color:'#38bdf8'},
    {x:50,y:50,color:'#2dd4a0'},
    {x:20,y:80,color:'#ffd166'},
    {x:85,y:75,color:'#ff5e6c'},
  ],
  meshBlur:55, meshOpacity:90, meshSel:-1,
  // ui
  ctx:'rect', codeTab:'css', bgColor:'#0d0d12',
};

const _hist = [], _future = [];
const gradHist = [];

/* ═══════════════════════════════════════
   PRESETS
═══════════════════════════════════════ */
const PRESETS = {
  conic:[
    {n:'Wheel',    s:[{c:'#6c63ff',p:0},{c:'#38bdf8',p:25},{c:'#2dd4a0',p:50},{c:'#ffd166',p:75},{c:'#6c63ff',p:100}],a:0},
    {n:'Neon Arc', s:[{c:'#ff5e6c',p:0},{c:'#ffd166',p:50},{c:'#2dd4a0',p:100}],a:45},
    {n:'Pie',      s:[{c:'#6c63ff',p:0},{c:'#6c63ff',p:33},{c:'#ff5e6c',p:33},{c:'#ff5e6c',p:66},{c:'#ffd166',p:66},{c:'#ffd166',p:100}],a:0},
    {n:'Twilight', s:[{c:'#0a0a2e',p:0},{c:'#1a0047',p:40},{c:'#ff5e6c',p:80},{c:'#ffd166',p:100}],a:0},
    {n:'Spectrum', s:[{c:'#ff0000',p:0},{c:'#ff9500',p:17},{c:'#ffd166',p:33},{c:'#00c853',p:50},{c:'#00d4ff',p:67},{c:'#6c63ff',p:83},{c:'#ff0000',p:100}],a:0},
    {n:'Cyber',    s:[{c:'#0d0d12',p:0},{c:'#6c63ff',p:50},{c:'#38bdf8',p:100}],a:135},
    {n:'Candy',    s:[{c:'#f9c6d0',p:0},{c:'#c9b8ff',p:33},{c:'#b8e8ff',p:66},{c:'#c8f7c5',p:100}],a:0},
    {n:'Starburst',s:[{c:'#fff',p:0},{c:'#ffd166',p:8},{c:'#ff5e6c',p:16},{c:'#fff',p:24},{c:'#ffd166',p:32},{c:'#ff5e6c',p:40},{c:'#fff',p:48},{c:'#ffd166',p:56},{c:'#ff5e6c',p:64},{c:'#fff',p:72},{c:'#ffd166',p:80},{c:'#ff5e6c',p:88},{c:'#fff',p:100}],a:0},
  ],
  linear:[
    {n:'Aurora',   s:[{c:'#2dd4a0',p:0},{c:'#38bdf8',p:50},{c:'#6c63ff',p:100}],a:45},
    {n:'Fire',     s:[{c:'#ff5e6c',p:0},{c:'#ff9500',p:50},{c:'#ffd166',p:100}],a:90},
    {n:'Ocean',    s:[{c:'#023047',p:0},{c:'#0466c8',p:50},{c:'#48cae4',p:100}],a:180},
    {n:'Forest',   s:[{c:'#0d4732',p:0},{c:'#1a7a45',p:50},{c:'#2db56b',p:100}],a:160},
    {n:'Rose Gold',s:[{c:'#b5838d',p:0},{c:'#e5989b',p:50},{c:'#ffb4a2',p:100}],a:135},
    {n:'Dusk',     s:[{c:'#1a1a2e',p:0},{c:'#16213e',p:50},{c:'#0f3460',p:100}],a:135},
    {n:'Neon',     s:[{c:'#0d0d12',p:0},{c:'#6c63ff',p:50},{c:'#2dd4a0',p:100}],a:135},
    {n:'Hologram', s:[{c:'#ff5e6c',p:0},{c:'#6c63ff',p:33},{c:'#38bdf8',p:66},{c:'#2dd4a0',p:100}],a:90},
  ],
  radial:[
    {n:'Solar',    s:[{c:'#ffd166',p:0},{c:'#ff9500',p:50},{c:'#ff5e6c',p:100}]},
    {n:'Deep Sea', s:[{c:'#2dd4a0',p:0},{c:'#0066cc',p:50},{c:'#001122',p:100}]},
    {n:'Nebula',   s:[{c:'#2d1b69',p:0},{c:'#11998e',p:50},{c:'#38ef7d',p:100}]},
    {n:'Eclipse',  s:[{c:'#1a1a2e',p:0},{c:'#6c63ff',p:60},{c:'#ff5e6c',p:100}]},
    {n:'Arctic',   s:[{c:'#e0f7fa',p:0},{c:'#80deea',p:50},{c:'#0277bd',p:100}]},
    {n:'Amber',    s:[{c:'#fff8e1',p:0},{c:'#ffd166',p:40},{c:'#ff9500',p:100}]},
    {n:'Midnight', s:[{c:'#6c63ff',p:0},{c:'#1a1a2e',p:60},{c:'#000',p:100}]},
    {n:'Prism',    s:[{c:'#fff',p:0},{c:'rgba(108,99,255,.4)',p:50},{c:'transparent',p:100}]},
  ],
  mesh:[
    {n:'Neon',   nodes:[{x:10,y:10,color:'#ff5e6c'},{x:80,y:15,color:'#6c63ff'},{x:50,y:50,color:'#38bdf8'},{x:15,y:85,color:'#2dd4a0'},{x:85,y:80,color:'#ffd166'}],blur:55},
    {n:'Pastel', nodes:[{x:20,y:20,color:'#f9c6d0'},{x:75,y:10,color:'#c9b8ff'},{x:50,y:55,color:'#b8e8ff'},{x:10,y:80,color:'#c8f7c5'},{x:85,y:75,color:'#fff5ba'}],blur:70},
    {n:'Aurora', nodes:[{x:5,y:50,color:'#2dd4a0'},{x:35,y:20,color:'#38bdf8'},{x:65,y:70,color:'#6c63ff'},{x:90,y:40,color:'#ff5e6c'}],blur:65},
    {n:'Cosmic', nodes:[{x:50,y:50,color:'#1a0047'},{x:10,y:10,color:'#0a0a2e'},{x:85,y:20,color:'#ff5e6c'},{x:20,y:85,color:'#ff9500'},{x:90,y:85,color:'#ffd166'}],blur:60},
  ],
};

const PALETTES = [
  ['#ff5e6c','#ffd166','#2dd4a0'],
  ['#6c63ff','#38bdf8','#2dd4a0'],
  ['#f72585','#7209b7','#4cc9f0'],
  ['#ff9500','#ff5e6c','#6c63ff'],
  ['#023047','#0466c8','#48cae4'],
  ['#2d1b69','#11998e','#38ef7d'],
  ['#b5838d','#e5989b','#ffb4a2'],
  ['#0d4732','#1a7a45','#ffd166'],
];

const TYPE_META = {
  conic:  {icon:'◎', desc:'Sweeps color around a center point'},
  linear: {icon:'━', desc:'Transitions along a straight line'},
  radial: {icon:'◉', desc:'Radiates outward from a center'},
  mesh:   {icon:'⊞', desc:'Drag colored blobs freely'},
};

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function toast(msg,dur=2200){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}
function hexToRgba(hex,a=1){
  if(!hex||hex.startsWith('rgba')||hex.startsWith('rgb')) return hex;
  if(hex==='transparent') return 'rgba(0,0,0,0)';
  const m=hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if(!m) return hex;
  return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})`;
}

/* ═══════════════════════════════════════
   HISTORY
═══════════════════════════════════════ */
function snapshot(){
  _hist.push(JSON.stringify(S));
  if(_hist.length>50)_hist.shift();
  _future.length=0;
  syncUndoRedo();
}
function undo(){
  if(!_hist.length){toast('Nothing to undo');return}
  _future.push(JSON.stringify(S));
  Object.assign(S,JSON.parse(_hist.pop()));
  syncUndoRedo(); renderAll(); toast('Undo ↺');
}
function redo(){
  if(!_future.length){toast('Nothing to redo');return}
  _hist.push(JSON.stringify(S));
  Object.assign(S,JSON.parse(_future.pop()));
  syncUndoRedo(); renderAll(); toast('Redo ↻');
}
function syncUndoRedo(){
  document.getElementById('btn-undo').disabled=!_hist.length;
  document.getElementById('btn-redo').disabled=!_future.length;
}

/* ═══════════════════════════════════════
   CSS BUILDERS
═══════════════════════════════════════ */
function buildStops(){return [...S.stops].sort((a,b)=>a.pos-b.pos).map(s=>`${s.color} ${s.pos}%`).join(', ')}
function buildGradient(){
  const st=buildStops();
  switch(S.type){
    case 'conic':  return `${S.repeating?'repeating-':''}conic-gradient(from ${S.angle}deg at ${S.centerX}% ${S.centerY}%, ${st})`;
    case 'linear': return `${S.linRepeating?'repeating-':''}linear-gradient(${S.linAngle}deg, ${st})`;
    case 'radial': return `${S.radRepeating?'repeating-':''}radial-gradient(${S.radShape} ${S.radSize} at ${S.radX}% ${S.radY}%, ${st})`;
    case 'mesh':   return buildMeshLayers();
  }
}
function buildMeshLayers(){
  return S.meshNodes.map(nd=>{
    const rgba=hexToRgba(nd.color, S.meshOpacity/100);
    return `radial-gradient(ellipse ${S.meshBlur}% ${S.meshBlur}% at ${nd.x.toFixed(1)}% ${nd.y.toFixed(1)}%, ${rgba}, transparent)`;
  }).join(', ');
}
function buildMeshLayersForCode(){
  return S.meshNodes.map(nd=>{
    const rgba=hexToRgba(nd.color, S.meshOpacity/100);
    return `radial-gradient(ellipse ${S.meshBlur}% ${S.meshBlur}% at ${nd.x.toFixed(1)}% ${nd.y.toFixed(1)}%, ${rgba}, transparent)`;
  }).join(',\n    ');
}

/* ═══════════════════════════════════════
   CODE OUTPUT
═══════════════════════════════════════ */
function buildCode(){
  const g = S.type==='mesh' ? buildMeshLayersForCode() : buildGradient();
  switch(S.codeTab){
    case 'css':      return hl_css(`.gradient {\n  background: ${g};\n}`);
    case 'scss':     return hl_css(`$gradient: ${g};\n\n.gradient {\n  background: $gradient;\n}`);
    case 'react':    return hl_jsx(`const style = {\n  background: \`${g}\`,\n};\n\n// <div style={style} />`);
    case 'tailwind': return hl_html(`<!-- inline style -->\n<div\n  class="w-full h-full"\n  style="background: ${g}"\n/>`);
    case 'svg':{
      if(S.type==='linear'){
        const rad=S.linAngle*Math.PI/180;
        const x1=(50-Math.sin(rad)*50).toFixed(1), y1=(50+Math.cos(rad)*50).toFixed(1);
        const x2=(50+Math.sin(rad)*50).toFixed(1), y2=(50-Math.cos(rad)*50).toFixed(1);
        const stops=S.stops.map(s=>`  <stop offset="${s.pos}%" stop-color="${s.color}"/>`).join('\n');
        return hl_html(`<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">\n<defs>\n<linearGradient id="g" x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%">\n${stops}\n</linearGradient>\n</defs>\n<rect width="100%" height="100%" fill="url(#g)"/>\n</svg>`);
      }
      const stops=S.stops.map(s=>`  <stop offset="${s.pos}%" stop-color="${s.color}"/>`).join('\n');
      return hl_html(`<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">\n<defs>\n<radialGradient id="g" cx="${S.radX}%" cy="${S.radY}%" r="70%">\n${stops}\n</radialGradient>\n</defs>\n<rect width="100%" height="100%" fill="url(#g)"/>\n</svg>`);
    }
  }
}
function rawCode(){
  const g=S.type==='mesh'?buildMeshLayersForCode():buildGradient();
  switch(S.codeTab){
    case 'css':      return `.gradient {\n  background: ${g};\n}`;
    case 'scss':     return `$gradient: ${g};\n\n.gradient {\n  background: $gradient;\n}`;
    case 'react':    return `const style = {\n  background: \`${g}\`,\n};\n\n// <div style={style} />`;
    case 'tailwind': return `<div class="w-full h-full" style="background: ${g}" />`;
    case 'svg':      return document.getElementById('code-block').textContent;
  }
}
function hl_css(c){return c.replace(/(\.[\w-]+\s*\{)/g,'<span class="tok-sel">$1</span>').replace(/\$[\w-]+/g,m=>`<span class="tok-sel">${m}</span>`).replace(/(background|color)(:\s*)/g,'<span class="tok-prop">$1</span><span class="tok-punc">$2</span>').replace(/(conic-gradient|linear-gradient|radial-gradient|repeating-[\w-]+)/g,'<span class="tok-fn">$1</span>').replace(/(rgba?\([^)]+\)|#[0-9a-fA-F]{3,8}|transparent)/g,'<span class="tok-color">$1</span>').replace(/(\d+\.?\d*)(px|%|deg)?(?=[\s,)])/g,'<span class="tok-num">$1</span><span class="tok-punc">$2</span>')}
function hl_jsx(c){return c.replace(/(const|let|var)/g,'<span class="tok-fn">$1</span>').replace(/(background)(:\s*)/g,'<span class="tok-prop">$1</span>$2').replace(/`([^`]*)`/g,(_,g)=>`<span class="tok-color">\`${g}\`</span>`).replace(/(\/\/.*)/g,'<span class="tok-comment">$1</span>')}
function hl_html(c){return c.replace(/(<[^>]+>)/g,'<span class="tok-sel">$1</span>').replace(/(class|style|id|fill|width|height)=/g,'<span class="tok-prop">$1</span>=').replace(/(<!--.*?-->)/g,'<span class="tok-comment">$1</span>')}

/* ═══════════════════════════════════════
   RENDER — ALL
═══════════════════════════════════════ */
function renderAll(){
  renderPresets();
  // show/hide track section for mesh
  const trackSec=document.getElementById('track-section');
  const stopEd=document.getElementById('stop-ed');
  if(S.type==='mesh'){
    trackSec.style.display='none';
    stopEd.style.display='none';
  } else {
    trackSec.style.display='';
    stopEd.style.display='';
    renderTrack();
    renderStopEd();
  }
  renderTypeCtrl();
  renderPreview();
  renderCode();
  renderHistoryRow();
}

/* ── PRESETS ── */
function renderPresets(){
  const grid=document.getElementById('presets-grid');
  grid.innerHTML='';
  (PRESETS[S.type]||[]).forEach(p=>{
    const div=document.createElement('div');
    div.className='preset-card';
    if(S.type==='mesh'){
      div.style.backgroundColor='#0d0d1a';
      div.style.backgroundImage=p.nodes.map(nd=>`radial-gradient(ellipse ${p.blur||55}% ${p.blur||55}% at ${nd.x}% ${nd.y}%, ${hexToRgba(nd.color,.9)}, transparent)`).join(', ');
    } else {
      const stops=(p.s||[]).map(s=>`${s.c} ${s.p}%`).join(', ');
      if(S.type==='conic')        div.style.background=`conic-gradient(from ${p.a||0}deg, ${stops})`;
      else if(S.type==='linear')  div.style.background=`linear-gradient(${p.a||135}deg, ${stops})`;
      else                         div.style.background=`radial-gradient(ellipse at center, ${stops})`;
    }
    div.innerHTML=`<div class="preset-name">${p.n}</div>`;
    div.onclick=()=>applyPreset(p);
    grid.appendChild(div);
  });
}
function applyPreset(p){
  snapshot();
  if(S.type==='mesh'){
    S.meshNodes=JSON.parse(JSON.stringify(p.nodes));
    if(p.blur!==undefined) S.meshBlur=p.blur;
    S.meshSel=-1;
  } else {
    S.stops=(p.s||[]).map(s=>({color:s.c, pos:s.p}));
    if(p.a!==undefined){if(S.type==='conic')S.angle=p.a; else S.linAngle=p.a;}
    S.selStop=0;
  }
  renderAll();
}

/* ── TRACK ── */
function renderTrack(){
  const track=document.getElementById('gradient-track');
  const layer=document.getElementById('track-layer');
  const sorted=[...S.stops].sort((a,b)=>a.pos-b.pos);
  layer.style.background=`linear-gradient(to right, ${sorted.map(s=>`${s.color} ${s.pos}%`).join(', ')})`;
  track.querySelectorAll('.stop-handle').forEach(h=>h.remove());
  S.stops.forEach((stop,i)=>{
    const h=document.createElement('div');
    h.className='stop-handle'+(i===S.selStop?' sel':'');
    h.style.left=stop.pos+'%';
    h.innerHTML=`<div class="sh-swatch" style="background:${stop.color}"></div><div class="sh-needle"></div>`;
    h.addEventListener('mousedown',e=>handleDrag(e,i));
    h.addEventListener('touchstart',e=>handleTouchDrag(e,i),{passive:false});
    h.addEventListener('click',e=>{e.stopPropagation();selStop(i)});
    h.addEventListener('dblclick',e=>{e.stopPropagation();removeStop(i)});
    track.appendChild(h);
  });
}
function handleDrag(e,idx){
  e.preventDefault(); selStop(idx);
  const track=document.getElementById('gradient-track');
  const rect=track.getBoundingClientRect();
  const move=ev=>{
    const pos=clamp(Math.round(((ev.clientX-rect.left)/rect.width)*100),0,100);
    S.stops[idx].pos=pos; renderTrack(); renderPreview(); renderCode();
  };
  const up=()=>{snapshot();document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up)};
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}
function handleTouchDrag(e,idx){
  e.preventDefault(); selStop(idx);
  const track=document.getElementById('gradient-track');
  const rect=track.getBoundingClientRect();
  const move=ev=>{
    const t=ev.touches[0];
    const pos=clamp(Math.round(((t.clientX-rect.left)/rect.width)*100),0,100);
    S.stops[idx].pos=pos; renderTrack(); renderPreview(); renderCode();
  };
  const end=()=>{snapshot();document.removeEventListener('touchmove',move);document.removeEventListener('touchend',end)};
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('touchend',end);
}
// click track to add stop
document.getElementById('gradient-track').addEventListener('click',function(e){
  if(e.target.closest('.stop-handle')) return;
  const rect=this.getBoundingClientRect();
  const pos=clamp(Math.round(((e.clientX-rect.left)/rect.width)*100),0,100);
  snapshot();
  // pick nearest stop color as default
  const sorted=[...S.stops].sort((a,b)=>Math.abs(a.pos-pos)-Math.abs(b.pos-pos));
  S.stops.push({color:sorted[0]?.color||'#ffffff', pos});
  S.selStop=S.stops.length-1;
  renderAll(); toast('Stop added');
});

function selStop(i){S.selStop=i; renderTrack(); renderStopEd()}
function renderStopEd(){
  const ed=document.getElementById('stop-ed');
  const stop=S.stops[S.selStop];
  if(!stop){ed.classList.add('hidden');return}
  ed.classList.remove('hidden');
  document.getElementById('swatch-bg').style.background=stop.color;
  const ci=document.getElementById('stop-color');
  if(stop.color.startsWith('#')&&stop.color.length===7) ci.value=stop.color;
  document.getElementById('stop-hex').value=stop.color;
  document.getElementById('stop-pos').value=stop.pos;
}
function onStopColor(val){
  const stop=S.stops[S.selStop]; if(!stop) return;
  stop.color=val;
  document.getElementById('stop-hex').value=val;
  document.getElementById('swatch-bg').style.background=val;
  renderTrack(); renderPreview(); renderCode();
}
function onStopHex(val){
  if(!/^#[0-9a-f]{6}$/i.test(val)&&!val.startsWith('rgb')&&val!=='transparent') return;
  const stop=S.stops[S.selStop]; if(!stop) return;
  stop.color=val;
  document.getElementById('swatch-bg').style.background=val;
  try{document.getElementById('stop-color').value=val}catch(e){}
  renderTrack(); renderPreview(); renderCode();
}
function onStopPos(val){
  const stop=S.stops[S.selStop]; if(!stop) return;
  snapshot(); stop.pos=clamp(val,0,100); renderAll();
}
function removeStop(idx){
  if(S.stops.length<=2){toast('Minimum 2 stops');return}
  snapshot(); S.stops.splice(idx,1);
  S.selStop=clamp(S.selStop,0,S.stops.length-1);
  renderAll(); toast('Stop removed');
}

/* ── TYPE CONTROLS ── */
function renderTypeCtrl(){
  const panel=document.getElementById('type-ctrl');
  panel.innerHTML='';

  // banner
  const meta=TYPE_META[S.type];
  const banner=document.createElement('div');
  banner.className='type-banner';
  banner.innerHTML=`<span class="type-banner-icon">${meta.icon}</span><div><div class="type-banner-name">${S.type} Gradient</div><div class="type-banner-desc">${meta.desc}</div></div>`;
  panel.appendChild(banner);

  const lbl=t=>{const d=document.createElement('div');d.className='sec-label';d.textContent=t;panel.appendChild(d)};
  const row=(label,content)=>{
    const d=document.createElement('div');d.className='ctrl-row';
    d.innerHTML=`<span class="ctrl-lbl">${label}</span>`;
    d.appendChild(content); panel.appendChild(d);
  };

  function sliderRow(label,min,max,val,key,suffix='',step=1){
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;align-items:center;gap:8px;flex:1';
    const sl=document.createElement('input');
    sl.type='range';sl.min=min;sl.max=max;sl.step=step;sl.value=val;sl.className='ctrl-slider';
    const prog=(val-min)/(max-min)*100;
    sl.style.setProperty('--prog',prog+'%');
    const badge=document.createElement('span');
    badge.className='ctrl-val'; badge.textContent=val+suffix;
    sl.oninput=function(){
      const p=(this.value-min)/(max-min)*100;
      this.style.setProperty('--prog',p+'%');
      badge.textContent=this.value+suffix;
      S[key]=+this.value;
      if(S.type==='mesh') applyMeshGradient(); else renderPreview();
      renderCode();
    };
    sl.onchange=()=>snapshot();
    wrap.appendChild(sl); wrap.appendChild(badge);
    row(label,wrap);
  }

  function angleRow(label,key){
    const wrap=document.createElement('div'); wrap.className='angle-wrap';
    const dial=document.createElement('div'); dial.className='angle-dial';
    dial.style.transform=`rotate(${S[key]}deg)`;
    const inp=document.createElement('input'); inp.className='angle-in';
    inp.type='number';inp.min=0;inp.max=360;inp.value=S[key];
    const setA=a=>{
      S[key]=((a%360)+360)%360; inp.value=S[key];
      dial.style.transform=`rotate(${S[key]}deg)`;
      renderPreview(); renderCode();
    };
    let drag=false,startY=0,startA=0;
    dial.addEventListener('mousedown',e=>{drag=true;startY=e.clientY;startA=S[key];e.preventDefault()});
    document.addEventListener('mousemove',e=>{if(drag)setA(startA-(e.clientY-startY))});
    document.addEventListener('mouseup',()=>{if(drag){drag=false;snapshot()}});
    dial.addEventListener('touchstart',e=>{drag=true;startY=e.touches[0].clientY;startA=S[key];e.preventDefault()},{passive:false});
    document.addEventListener('touchmove',e=>{if(drag)setA(startA-(e.touches[0].clientY-startY))},{passive:false});
    document.addEventListener('touchend',()=>{if(drag){drag=false;snapshot()}});
    inp.oninput=()=>setA(+inp.value);
    inp.onchange=()=>snapshot();
    const deg=document.createElement('span'); deg.className='ctrl-val'; deg.textContent='°';
    wrap.appendChild(dial); wrap.appendChild(inp); wrap.appendChild(deg);
    row(label,wrap);
  }

  function chipRow(label,opts,key){
    const wrap=document.createElement('div'); wrap.className='toggle-row';
    opts.forEach(o=>{
      const btn=document.createElement('button'); btn.className='chip'+(S[key]===o.v?' active':'');
      btn.textContent=o.l;
      btn.onclick=()=>{snapshot();S[key]=o.v;wrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');renderPreview();renderCode()};
      wrap.appendChild(btn);
    });
    row(label,wrap);
  }

  function selectRow(label,opts,key){
    const sel=document.createElement('select'); sel.className='sel-in';
    opts.forEach(o=>{const op=document.createElement('option');op.value=o.v;op.textContent=o.l;if(S[key]===o.v)op.selected=true;sel.appendChild(op)});
    sel.onchange=()=>{snapshot();S[key]=sel.value;renderPreview();renderCode()};
    row(label,sel);
  }

  if(S.type==='conic'){
    lbl('Conic Controls');
    angleRow('Start Angle','angle');
    sliderRow('Center X',0,100,S.centerX,'centerX','%');
    sliderRow('Center Y',0,100,S.centerY,'centerY','%');
    chipRow('Repeating',[{l:'Off',v:false},{l:'On',v:true}],'repeating');
  } else if(S.type==='linear'){
    lbl('Linear Controls');
    angleRow('Direction','linAngle');
    chipRow('Repeating',[{l:'Off',v:false},{l:'On',v:true}],'linRepeating');
  } else if(S.type==='radial'){
    lbl('Radial Controls');
    chipRow('Shape',[{l:'Ellipse',v:'ellipse'},{l:'Circle',v:'circle'}],'radShape');
    selectRow('Size',[{v:'farthest-corner',l:'Farthest Corner'},{v:'closest-corner',l:'Closest Corner'},{v:'farthest-side',l:'Farthest Side'},{v:'closest-side',l:'Closest Side'}],'radSize');
    sliderRow('Center X',0,100,S.radX,'radX','%');
    sliderRow('Center Y',0,100,S.radY,'radY','%');
    chipRow('Repeating',[{l:'Off',v:false},{l:'On',v:true}],'radRepeating');
  } else if(S.type==='mesh'){
    lbl('Mesh Controls');
    sliderRow('Blob Size',10,100,S.meshBlur,'meshBlur','%');
    sliderRow('Opacity',10,100,S.meshOpacity,'meshOpacity','%');

    const nodeLabel=document.createElement('div');
    nodeLabel.className='sec-label'; nodeLabel.style.marginTop='8px';
    nodeLabel.textContent='Color Nodes'; panel.appendChild(nodeLabel);

    const hint=document.createElement('div');
    hint.style.cssText='font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5';
    hint.textContent='Drag dots in preview · Click empty area to add · Dbl-click dot to delete';
    panel.appendChild(hint);

    S.meshNodes.forEach((nd,i)=>{
      const row2=document.createElement('div');
      row2.className='mesh-node-row'+(S.meshSel===i?' sel':'');
      row2.dataset.idx=i;

      // drag handle
      const handle=document.createElement('div'); handle.className='drag-handle';
      handle.innerHTML='<span></span><span></span><span></span>';
      handle.addEventListener('mousedown',e=>startNodeReorder(e,i,row2));
      handle.addEventListener('touchstart',e=>startNodeReorderTouch(e,i,row2),{passive:false});

      // color swatch
      const sw=document.createElement('div');
      sw.className='node-swatch'; sw.style.background=nd.color;
      sw.style.borderColor=S.meshSel===i?'var(--accent)':'var(--bdr2)';
      const ci=document.createElement('input');
      ci.type='color'; ci.value=nd.color.startsWith('#')?nd.color:'#ffffff';
      ci.style.cssText='position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);opacity:0;cursor:pointer';
      ci.oninput=ci.onchange=function(){
        snapshot(); S.meshNodes[i].color=this.value;
        sw.style.background=this.value;
        applyMeshGradient(); renderCode();
        const dots=document.querySelectorAll('.mesh-dot');
        if(dots[i]) dots[i].style.background=this.value;
      };
      sw.appendChild(ci);

      const info=document.createElement('div'); info.className='node-info';
      info.innerHTML=`<div class="node-color">${nd.color}</div><div class="node-pos">x:${Math.round(nd.x)}% · y:${Math.round(nd.y)}%</div>`;

      const del=document.createElement('button'); del.className='node-del'; del.innerHTML='×';
      del.onclick=e=>{
        e.stopPropagation();
        if(S.meshNodes.length<=2){toast('Minimum 2 nodes');return}
        snapshot(); S.meshNodes.splice(i,1);
        if(S.meshSel>=S.meshNodes.length) S.meshSel=S.meshNodes.length-1;
        renderAll();
      };

      row2.onclick=()=>{S.meshSel=i; renderTypeCtrl(); syncMeshDotSelection()};
      row2.appendChild(handle); row2.appendChild(sw); row2.appendChild(info); row2.appendChild(del);
      panel.appendChild(row2);
    });

    const addBtn=document.createElement('button'); addBtn.className='add-btn'; addBtn.textContent='+ Add Node';
    addBtn.onclick=()=>{
      snapshot();
      S.meshNodes.push({x:clamp(20+Math.round(Math.random()*60),5,95), y:clamp(20+Math.round(Math.random()*60),5,95), color:'#ffffff'});
      S.meshSel=S.meshNodes.length-1;
      renderAll(); toast('Node added — pick a color in the panel');
    };
    panel.appendChild(addBtn);
  }
}

/* ═══════════════════════════════════════
   PREVIEW
═══════════════════════════════════════ */
let _lastCtx = null;

function applyMeshGradient(){
  const bg=document.getElementById('mesh-bg');
  if(!bg) return;
  bg.style.backgroundImage=buildMeshLayers();
}

function syncMeshDotSelection(){
  document.querySelectorAll('.mesh-dot').forEach((d,i)=>d.classList.toggle('sel',i===S.meshSel));
}

function renderPreview(){
  const stage=document.getElementById('prev-stage');
  const isMesh=S.type==='mesh';

  // set stage bg
  stage.classList.toggle('mesh-mode',isMesh);
  if(S.bgColor==='checker'){
    stage.style.backgroundColor='';
    stage.style.backgroundImage='repeating-conic-gradient(#1a1a22 0% 25%,#0d0d12 0% 50%)';
    stage.style.backgroundSize='32px 32px';
  } else {
    stage.style.backgroundColor=S.bgColor;
    if(!isMesh){stage.style.backgroundImage='';stage.style.backgroundSize='';}
  }

  if(isMesh){
    // ensure mesh layer divs exist
    let meshBg=document.getElementById('mesh-bg');
    let meshCv=document.getElementById('mesh-cv');
    if(!meshBg){
      stage.innerHTML='';
      meshBg=document.createElement('div'); meshBg.id='mesh-bg'; meshBg.className='mesh-bg';
      meshCv=document.createElement('div'); meshCv.id='mesh-cv'; meshCv.className='mesh-cv';
      stage.appendChild(meshBg);
      stage.appendChild(meshCv);
    }

    // set bg color on meshBg
    if(S.bgColor==='checker'){
      meshBg.style.backgroundColor='';
      meshBg.style.backgroundImage='repeating-conic-gradient(#1a1a22 0% 25%,#0d0d12 0% 50%),'+buildMeshLayers();
      meshBg.style.backgroundSize='32px 32px, auto';
    } else {
      meshBg.style.backgroundColor=S.bgColor;
      meshBg.style.backgroundImage=buildMeshLayers();
      meshBg.style.backgroundSize='';
    }

    buildMeshDots(meshCv);
    _lastCtx='__mesh__';
    return;
  }

  // clear mesh leftovers
  stage.style.backgroundImage='';
  stage.style.backgroundSize='';

  // always rebuild — gradient must reflect latest stops
  const g=buildGradient();
  const ctxChanged=_lastCtx!==S.ctx;
  stage.innerHTML=buildPreviewHTML(g);

  const child=stage.firstElementChild;
  if(child && ctxChanged){
    child.classList.add('anim-in');
    child.addEventListener('animationend',()=>child.classList.remove('anim-in'),{once:true});
  }
  _lastCtx=S.ctx;
}

function buildPreviewHTML(g){
  const bg=`background:${g}`;
  switch(S.ctx){
    case 'rect':
      return `<div class="ctx-box ctx-rect" style="${bg}"></div>`;
    case 'card':
      return `<div class="card-ctx"><div class="card-hdr" style="${bg}"><h2>Gradient Card</h2><p>Beautiful CSS gradients</p></div><div class="card-body"><div class="card-avatar"></div><div><div class="card-meta">GradientForge Pro</div><div class="card-sub">Generated with precision</div></div></div></div>`;
    case 'button':
      return `<div class="btn-ctx"><button class="g-btn" style="${bg}">Get Started →</button><button class="g-btn" style="${bg}">Secondary Action</button><button class="g-icon-btn" style="${bg}">✦</button></div>`;
    case 'text':
      return `<div class="text-ctx"><div class="g-text" style="${bg};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Gradient<br>Typography</div><p class="g-sub">CSS gradient as text fill</p></div>`;
    case 'border':
      return `<div class="border-ctx"><div class="g-border-card" style="border-image:${g} 1"><div class="g-border-title">Gradient Border</div>This card uses a gradient border via border-image CSS.</div></div>`;
  }
  return '';
}

/* ── MESH DOTS ── */
function buildMeshDots(cv){
  cv.innerHTML='';
  S.meshNodes.forEach((nd,i)=>{
    const dot=document.createElement('div');
    dot.className='mesh-dot'+(S.meshSel===i?' sel':'');
    dot.style.left=nd.x+'%'; dot.style.top=nd.y+'%';
    dot.style.background=nd.color;

    dot.addEventListener('mousedown',e=>{
      e.stopPropagation();
      S.meshSel=i; syncMeshDotSelection(); renderTypeCtrl();
      meshDrag(e,i);
    });
    dot.addEventListener('touchstart',e=>{
      e.stopPropagation();
      S.meshSel=i; syncMeshDotSelection(); renderTypeCtrl();
      meshTouchDrag(e,i);
    },{passive:false});
    dot.addEventListener('click',e=>e.stopPropagation());
    dot.addEventListener('dblclick',e=>{
      e.stopPropagation();
      if(S.meshNodes.length<=2){toast('Minimum 2 nodes');return}
      snapshot(); S.meshNodes.splice(i,1);
      if(S.meshSel>=S.meshNodes.length) S.meshSel=S.meshNodes.length-1;
      renderAll();
    });

    cv.appendChild(dot);
  });

  // click empty canvas → add node
  cv.onclick=e=>{
    if(e.target!==cv) return;
    const rect=cv.getBoundingClientRect();
    const x=+((e.clientX-rect.left)/rect.width*100).toFixed(1);
    const y=+((e.clientY-rect.top)/rect.height*100).toFixed(1);
    snapshot();
    S.meshNodes.push({x,y,color:'#ffffff'});
    S.meshSel=S.meshNodes.length-1;
    // immediately update gradient + dots without full re-render
    applyMeshGradient();
    buildMeshDots(cv);
    renderTypeCtrl();
    renderCode();
    toast('Node added — pick a color in the panel');
  };
}

function meshDrag(e,idx){
  e.preventDefault();
  const stage=document.getElementById('prev-stage');
  const rect=stage.getBoundingClientRect();
  const move=ev=>{
    const x=clamp((ev.clientX-rect.left)/rect.width*100,0,100);
    const y=clamp((ev.clientY-rect.top)/rect.height*100,0,100);
    S.meshNodes[idx].x=+x.toFixed(1);
    S.meshNodes[idx].y=+y.toFixed(1);
    const dot=document.querySelectorAll('.mesh-dot')[idx];
    if(dot){dot.style.left=x+'%';dot.style.top=y+'%'}
    applyMeshGradient();
    renderCode();
  };
  const up=()=>{
    snapshot(); renderTypeCtrl();
    document.removeEventListener('mousemove',move);
    document.removeEventListener('mouseup',up);
  };
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}

function meshTouchDrag(e,idx){
  e.preventDefault();
  const stage=document.getElementById('prev-stage');
  const rect=stage.getBoundingClientRect();
  const move=ev=>{
    const t=ev.touches[0];
    const x=clamp((t.clientX-rect.left)/rect.width*100,0,100);
    const y=clamp((t.clientY-rect.top)/rect.height*100,0,100);
    S.meshNodes[idx].x=+x.toFixed(1);
    S.meshNodes[idx].y=+y.toFixed(1);
    const dot=document.querySelectorAll('.mesh-dot')[idx];
    if(dot){dot.style.left=x+'%';dot.style.top=y+'%'}
    applyMeshGradient();
    renderCode();
  };
  const end=()=>{
    snapshot(); renderTypeCtrl();
    document.removeEventListener('touchmove',move);
    document.removeEventListener('touchend',end);
  };
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('touchend',end);
}

/* ── CODE ── */
function renderCode(){
  document.getElementById('code-block').innerHTML=buildCode();
}

/* ── HISTORY ROW ── */
function addToGradHist(){
  const g=S.type==='mesh'?buildMeshLayers():buildGradient();
  gradHist.unshift({g, type:S.type});
  if(gradHist.length>16)gradHist.pop();
  renderHistoryRow();
}
function renderHistoryRow(){
  const row=document.getElementById('history-row'); row.innerHTML='';
  gradHist.forEach(({g,type})=>{
    const sw=document.createElement('div'); sw.className='hswatch';
    if(type==='mesh'){sw.style.backgroundColor='#0d0d1a';sw.style.backgroundImage=g;}
    else sw.style.background=g;
    sw.title='Click to restore';
    row.appendChild(sw);
  });
}

/* ═══════════════════════════════════════
   TYPE / CTX / BG SWITCHES
═══════════════════════════════════════ */
function setType(t){
  snapshot(); S.type=t; _lastCtx=null;
  document.querySelectorAll('.ts-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ts-'+t).classList.add('active');
  const p=PRESETS[t][0];
  if(t==='mesh'){
    S.meshNodes=JSON.parse(JSON.stringify(p.nodes));
    S.meshBlur=p.blur||55; S.meshSel=-1;
  } else {
    S.stops=(p.s||[]).map(s=>({color:s.c,pos:s.p}));
    if(p.a!==undefined){if(t==='conic')S.angle=p.a; else S.linAngle=p.a;}
    S.selStop=0;
  }
  renderAll();
}

function setCtx(ctx){
  S.ctx=ctx; _lastCtx=null;
  document.querySelectorAll('.ctx-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ctx-'+ctx).classList.add('active');
  renderPreview();
}

function setBg(el){
  S.bgColor=el.dataset.bg;
  document.querySelectorAll('.bg-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPreview();
}

   CODE TAB
═══════════════════════════════════════ */
function setCodeTab(t){
  S.codeTab=t;
  document.querySelectorAll('.code-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('ctab-'+t).classList.add('active');
  renderCode();
}

   COPY
═══════════════════════════════════════ */
function copyCSS(){
  navigator.clipboard.writeText(rawCode()).then(()=>{
    const btn=document.getElementById('copy-main');
    btn.classList.add('copied'); btn.innerHTML='<span>✓</span> COPIED!';
    addToGradHist(); toast('Copied to clipboard ✓');
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<span>⎘</span> COPY TO CLIPBOARD'},2000);
  }).catch(()=>toast('Copy failed — select manually'));
}

/* ═══════════════════════════════════════
   RANDOMIZE
═══════════════════════════════════════ */
function randomize(){
  snapshot();
  const pal=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  if(S.type==='mesh'){
    const n=3+Math.floor(Math.random()*3);
    S.meshNodes=Array.from({length:n},(_,i)=>({
      x:clamp(10+Math.round(Math.random()*80),5,95),
      y:clamp(10+Math.round(Math.random()*80),5,95),
      color:pal[i%pal.length],
    }));
    S.meshSel=-1;
  } else {
    const n=2+Math.floor(Math.random()*3);
    S.stops=Array.from({length:n},(_,i)=>({color:pal[i%pal.length],pos:Math.round(i/(n-1)*100)}));
    if(S.type==='conic')  S.angle=Math.round(Math.random()*360);
    if(S.type==='linear') S.linAngle=Math.round(Math.random()*360);
    if(S.type==='radial'){S.radX=20+Math.round(Math.random()*60);S.radY=20+Math.round(Math.random()*60)}
    S.selStop=0;
  }
  renderAll(); addToGradHist(); toast('New gradient ✦');
}

function mobileTab(tab){
  ['lft','ctr','rgt'].forEach(id=>document.getElementById(id).classList.remove('mob'));
  const map={ctrl:'lft',prev:'ctr',code:'rgt'};
  document.getElementById(map[tab]).classList.add('mob');
  ['mn-ctrl','mn-prev','mn-code'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('mn-'+tab).classList.add('active');
}

/* ═══════════════════════════════════════
   MESH NODE REORDER
═══════════════════════════════════════ */
let _dragIdx = null;

function startNodeReorder(e, idx, el) {
  e.preventDefault(); e.stopPropagation();
  _dragIdx = idx;
  el.classList.add('dragging');
  const panel = el.parentElement;
  const rows = ()=>[...panel.querySelectorAll('.mesh-node-row')];

  const move = ev => {
    const y = ev.clientY;
    let target = null, targetIdx = null;
    rows().forEach((r, ri) => {
      if(ri === _dragIdx) return;
      const rect = r.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) { target = r; targetIdx = +r.dataset.idx; }
    });
    rows().forEach(r => r.classList.remove('drag-over'));
    if(target) target.classList.add('drag-over');
  };

  const up = ev => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    el.classList.remove('dragging');
    rows().forEach(r => r.classList.remove('drag-over'));

    // find drop target
    const y = ev.clientY;
    let toIdx = _dragIdx;
    rows().forEach((r, ri) => {
      if(ri === _dragIdx) return;
      const rect = r.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) toIdx = +r.dataset.idx;
    });

    if(toIdx !== _dragIdx) {
      snapshot();
      const node = S.meshNodes.splice(_dragIdx, 1)[0];
      S.meshNodes.splice(toIdx, 0, node);
      if(S.meshSel === _dragIdx) S.meshSel = toIdx;
      renderAll();
      toast('Node order updated');
    }
    _dragIdx = null;
  };

  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

function startNodeReorderTouch(e, idx, el) {
  e.preventDefault(); e.stopPropagation();
  _dragIdx = idx;
  el.classList.add('dragging');
  const panel = el.parentElement;
  const rows = ()=>[...panel.querySelectorAll('.mesh-node-row')];

  const move = ev => {
    const y = ev.touches[0].clientY;
    rows().forEach(r => r.classList.remove('drag-over'));
    rows().forEach((r, ri) => {
      if(ri === _dragIdx) return;
      const rect = r.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) r.classList.add('drag-over');
    });
  };

  const end = ev => {
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', end);
    el.classList.remove('dragging');
    const y = ev.changedTouches[0].clientY;
    let toIdx = _dragIdx;
    rows().forEach((r, ri) => {
      if(ri === _dragIdx) return;
      const rect = r.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) toIdx = +r.dataset.idx;
    });
    rows().forEach(r => r.classList.remove('drag-over'));

    if(toIdx !== _dragIdx) {
      snapshot();
      const node = S.meshNodes.splice(_dragIdx, 1)[0];
      S.meshNodes.splice(toIdx, 0, node);
      if(S.meshSel === _dragIdx) S.meshSel = toIdx;
      renderAll();
      toast('Node order updated');
    }
    _dragIdx = null;
  };

  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);
}
