<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Ease Generator</title>
    <style>
      :root {
        /* Fallback values for VS Code theme variables */
        --fallback-editor-background: #1e1e1e;
        --fallback-editor-foreground: #d4d4d4;
        --fallback-button-background: #0e639c;
        --fallback-button-foreground: #ffffff;
        --fallback-button-hoverBackground: #1177bb;
        --fallback-input-background: #3c3c3c;
        --fallback-input-border: #555555;
        --fallback-descriptionForeground: #b4b4b4;
        --fallback-symbolIcon-colorForeground: #00a8ff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: var(--vscode-editor-background, var(--fallback-editor-background));
        color: var(--vscode-editor-foreground, var(--fallback-editor-foreground));
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      .container {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
        width: 100%;
        padding: 12px;
        gap: 12px;
      }

      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }

      .controls {
        display: grid;
        grid-template-columns: auto;
        gap: 8px;
      }

      button {
        padding: 6px 12px;
        background: var(--vscode-button-background, var(--fallback-button-background));
        color: var(--vscode-button-foreground, var(--fallback-button-foreground));
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.2s;
        white-space: nowrap;
        flex-shrink: 0;
      }

      button:hover {
        background: var(--vscode-button-hoverBackground, var(--fallback-button-hoverBackground));
      }

      .editor-section {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .canvas-wrapper {
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        background: var(--vscode-input-background, var(--fallback-input-background));
        border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
        border-radius: 4px;
        min-height: 0;
      }

      svg {
        --bg-color: var(--vscode-input-background, var(--fallback-input-background));
        flex: 1;
        border-radius: 2px;
        min-height: 0;
        width: 100%;
        overflow: visible;


        display: block;
        position: relative;
        z-index: 1
      }

      .control-point {
        cursor: grab;
        transition: r 0.15s ease, filter 0.15s ease;
        will-change: cx, cy;
      }

      .control-point:hover {
        filter: brightness(1.4) drop-shadow(0 0 6px rgba(0, 168, 255, 0.6));
        r: 14;
      }

      .control-point:active {
        cursor: grabbing;
        filter: brightness(1.5) drop-shadow(0 0 8px rgba(0, 168, 255, 0.8));
      }

      .control-point-circle {
        pointer-events: none;
      }

      .control-point-hit {
        cursor: grab;
        touch-action: none;
      }

      .control-point-hit:hover {
        cursor: grab;
      }

      #control-1-hit,
      #control-2-hit {
        transition: r 0.15s ease;
      }

      #control-1-hit:hover,
      #control-2-hit:hover {
        r: 40;
        filter: drop-shadow(0 0 4px rgba(0, 168, 255, 0.3));
      }

      .output-section {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        background: var(--vscode-input-background, var(--fallback-input-background));
        border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
        border-radius: 4px;
        padding: 12px;
        overflow-y: auto;
      }

      .output-section h3 {
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
        flex-shrink: 0;
      }

      .code-block {
        background: var(--vscode-editor-background, var(--fallback-editor-background));
        border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
        border-radius: 2px;
        padding: 8px;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 11px;
        word-break: break-all;
        color: var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground));
        flex-shrink: 0;
      }

      .copy-btn {
        width: 100%;
        padding: 6px 8px;
        flex-shrink: 0;
      }

      .info-text {
        font-size: 11px;
        color: var(--vscode-descriptionForeground, var(--fallback-descriptionForeground));
        line-height: 1.4;
      }

      .point-list {
        font-size: 11px;
        overflow-y: auto;
        background: var(--vscode-editor-background, var(--fallback-editor-background));
        border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
        border-radius: 2px;
        padding: 6px;
        flex-shrink: 0;
      }

      .duration-control {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 8px;
        background: var(--vscode-editor-background, var(--fallback-editor-background));
        border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
        border-radius: 4px;
      }

      .duration-control label {
        font-size: 12px;
        font-weight: 500;
        min-width: 60px;
      }

      .duration-control input[type="range"] {
        flex: 1;
        min-height: 4px;
        cursor: pointer;
      }

      .duration-value {
        font-family: monospace;
        font-size: 12px;
        min-width: 50px;
        text-align: right;
        background: var(--vscode-input-background, var(--fallback-input-background));
        border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
        border-radius: 3px;
        padding: 4px 8px;
      }

      .point-item {
        padding: 3px;
        background: transparent;
        margin-bottom: 3px;
        border-radius: 2px;
        font-family: monospace;
        font-size: 10px;
      }

      nav {
        display: grid;
        grid-template-columns: auto auto;
        gap: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--vscode-input-border, var(--fallback-input-border));
      }

      nav button {
        padding: 8px 16px;
        background: transparent;
        color: var(--vscode-descriptionForeground, var(--fallback-descriptionForeground));
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      nav button:hover {
        color: var(--vscode-editor-foreground, var(--fallback-editor-foreground));
      }

      nav button.active {
        color: var(--vscode-editor-foreground, var(--fallback-editor-foreground));
        border-bottom-color: var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground));
      }

      .editor-content {
        display: none;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .editor-content.active {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #preview {
        position: relative;
      }

      .preview-updating::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 8px;
        height: 8px;
        background: var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground));
        border-radius: 50%;
        animation: updatePulse 0.6s ease-in-out forwards;
        opacity: 0;
        transition: all .4s ease;

      }

      @keyframes updatePulse {
        0% {
          opacity: 1;
          transform: scale(1);
        }

        100% {
          opacity: 0;
          transform: scale(1.5);
        }
      }

      /* Mobile/Sidebar responsive styles */
      @media (max-width: 500px) {
        .container {
          padding: 8px;
          gap: 8px;
        }

        .header h1 {
          font-size: 14px;
        }



        .output-section {
          padding: 10px;
        }

        .output-section h3 {
          margin-bottom: 4px;
          font-size: 11px;
        }

        .code-block {
          padding: 6px;
          font-size: 10px;
        }

        .point-list {
          padding: 4px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>CSS Ease Generator</h1>
        <div class="controls">
          <button id="resetBtn">Reset Curve</button>
        </div>
      </div>

      <div class="editor-section">
        <nav>
          <button id="easingTab" class="active">Easing</button>
          <button id="springTab">Spring</button>
        </nav>

        <div id="easingEditor" class="editor-content active">
          <div class="canvas-wrapper">

            <svg id="easeCanvas" viewBox="0 0 330 330">
              <!-- Grid -->
              <g id="grid" opacity="0.1"></g>
              <!-- Axes -->
              <polyline fill="none" stroke="#333" stroke-width="2" points="0,0 0,330"></polyline>
              <polyline fill="none" stroke="#333" stroke-width="2" points="0,330 330,330"></polyline>
              <!-- Control lines (tethers) -->
              <polyline id="control-1-tether" fill="none" stroke="rgba(100, 150, 200, 0.3)" stroke-width="2"
                        stroke-dasharray="4, 2" points="0,330 33,198"></polyline>
              <polyline id="control-2-tether" fill="none" stroke="rgba(100, 150, 200, 0.3)" stroke-width="2"
                        stroke-dasharray="4, 2" points="330,0 297,16.35"></polyline>
              <!-- Cubic bezier curve -->
              <path id="bezierCurve" d="M 0,330 C 33,198 297,16.35 330,0" fill="none"
                        stroke="var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground))"
                        stroke-width="5" stroke-linecap="round"></path>
              <!-- Control points -->
              <!-- Hit areas for easier interaction (placed first for proper event handling) -->
              <circle id="control-1-hit" class="control-point-hit" r="40" cx="33" cy="198" fill="transparent"
                        style="touch-action:none; pointer-events: auto;"></circle>
              <circle id="control-2-hit" class="control-point-hit" r="40" cx="297" cy="16.35" fill="transparent"
                        style="touch-action:none; pointer-events: auto;"></circle>
              <!-- Visible control point circles -->
              <circle id="control-1" class="control-point control-point-circle" r="12" cx="33" cy="198"
                        fill="var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground))"
                        style="touch-action:none;"></circle>
              <circle id="control-2" class="control-point control-point-circle" r="12" cx="297" cy="16.35"
                        fill="var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground))"
                        style="touch-action:none;"></circle>
            </svg>
          </div>

          <div class="output-section">
            <h3>Duration</h3>
            <div class="duration-control">
              <label for="durationSlider">Duration:</label>
              <input type="range" id="durationSlider" min="0.1" max="10" step="0.1" value="1">
              <div class="duration-value" id="durationValue">1s</div>
            </div>

            <h3 style="margin-top: 15px;">CSS Output</h3>
            <div class="code-block" id="cssOutput">1s cubic-bezier(0.25, 0.1, 0.25, 1.0)</div>
            <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>

            <h3 style="margin-top: 15px;">Preview</h3>
            <div id="preview" style="
					width: 100%;
					height: 60px;
					background: var(--vscode-editor-background, var(--fallback-editor-background));
					border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
					border-radius: 2px;
					display: flex;
					align-items: center;
					overflow: hidden;
				">
              <div id="previewBox" style="
						width: 30px;
						height: 30px;
						background: var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground));
						margin-left: 10px;
						border-radius: 2px;
					"></div>
            </div>

            <h3 style="margin-top: 15px;">Control Points</h3>
            <div class="point-list" id="pointList"></div>
          </div>
        </div>

        <div id="springEditor" class="editor-content">
          <div class="canvas-wrapper">
            <svg id="springCanvas" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
              <path d="M184 0 L184 300" fill="transparent"
                        stroke="var(--token-f4968045-2b87-4693-9aa2-cfd330b580b3, rgba(255, 255, 255, 0.1))"
                        stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
              <path id="springPath" d="M0 150L1 150L2 150" fill="transparent"
                        stroke="var(--token-65b54c24-8db9-454b-9fc2-5de614e025ca, rgb(255, 43, 110))" stroke-width="7"
                        stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
          <div class="output-section">
            <h3>Duration</h3>
            <div class="duration-control">
              <label for="springDuration">Duration:</label>
              <input type="range" id="springDuration" min="0.1" max="10" step="0.1" value="1">
              <div class="duration-value" id="springDurationValue">1s</div>
            </div>

            <h3 style="margin-top: 15px;">Stiffness</h3>
            <div class="duration-control">
              <label for="stiffness">Stiffness:</label>
              <input type="range" id="stiffness" min="50" max="500" step="10" value="170">
              <div class="duration-value" id="stiffnessValue">170</div>
            </div>

            <h3 style="margin-top: 15px;">Damping</h3>
            <div class="duration-control">
              <label for="damping">Damping:</label>
              <input type="range" id="damping" min="5" max="100" step="1" value="26">
              <div class="duration-value" id="dampingValue">26</div>
            </div>

            <h3 style="margin-top: 15px;">Mass</h3>
            <div class="duration-control">
              <label for="mass">Mass:</label>
              <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1">
              <div class="duration-value" id="massValue">1.0</div>
            </div>

            <h3 style="margin-top: 15px;">Preview</h3>
            <div id="springPreview" style="
              width: 100%;
              height: 60px;
              background: var(--vscode-editor-background, var(--fallback-editor-background));
              border: 1px solid var(--vscode-input-border, var(--fallback-input-border));
              border-radius: 2px;
              display: flex;
              align-items: center;
              overflow: hidden;
            ">
              <div id="springPreviewBox" style="
                width: 30px;
                height: 30px;
                background: var(--vscode-symbolIcon-colorForeground, var(--fallback-symbolIcon-colorForeground));
                margin-left: 10px;
                border-radius: 2px;
              "></div>
            </div>
            <h3 style="margin-top: 15px;">CSS Output</h3>
            <div class="code-block" id="springCssOutput">animation: spring 1s</div>
            <button class="copy-btn" id="springCopyBtn">Copy to Clipboard</button>


          </div>
        </div>
      </div>
    </div>

    <script>
      let vscode;

      const handleVscodeAssignment = () =>
      {
        try
        {
          vscode = acquireVsCodeApi();
        } catch ( error )
        {
          vscode = {};
        }
      };
      handleVscodeAssignment();

      // Tab switching functionality
      const easingTab = document.getElementById( 'easingTab' );
      const springTab = document.getElementById( 'springTab' );
      const easingEditor = document.getElementById( 'easingEditor' );
      const springEditor = document.getElementById( 'springEditor' );

      function switchTab ( tabName )
      {
        if ( tabName === 'easing' )
        {
          easingEditor.classList.add( 'active' );
          springEditor.classList.remove( 'active' );
          easingTab.classList.add( 'active' );
          springTab.classList.remove( 'active' );
        } else
        {
          springEditor.classList.add( 'active' );
          easingEditor.classList.remove( 'active' );
          springTab.classList.add( 'active' );
          easingTab.classList.remove( 'active' );
        }
      }

      easingTab.addEventListener( 'click', () => switchTab( 'easing' ) );
      springTab.addEventListener( 'click', () => switchTab( 'spring' ) );

      const svg = document.getElementById( 'easeCanvas' );
      const cssOutput = document.getElementById( 'cssOutput' );
      const copyBtn = document.getElementById( 'copyBtn' );
      const resetBtn = document.getElementById( 'resetBtn' );
      const pointList = document.getElementById( 'pointList' );
      const previewBox = document.getElementById( 'previewBox' );
      const durationSlider = document.getElementById( 'durationSlider' );
      const durationValue = document.getElementById( 'durationValue' );

      // SVG viewBox dimensions (used for scaling)
      const SVG_SIZE = 330;
      const SVG_PADDING = 0;

      // Default control points (normalized 0-1)
      let controlPoints = [
        { x: 0, y: 0.5 }, // Point 1
        { x: 1, y: 0.5 }  // Point 2
      ];

      let duration = 1; // Duration in seconds

      let isDrawing = false;
      let selectedPoint = -1;
      let dragOffset = { x: 0, y: 0 }; // Offset between click point and control point center
      let previewUpdateTimeout; // Track debounce timeout

      // Debounce utility function
      function debounce ( func, delay )
      {
        let timeoutId;
        return function ( ...args )
        {
          clearTimeout( timeoutId );
          timeoutId = setTimeout( () =>
          {
            func.apply( this, args );
          }, delay );
        };
      }

      // Show UI indicator pulse
      function showUpdateIndicator ()
      {
        const preview = document.getElementById( 'preview' );
        preview.classList.remove( 'preview-updating' );
        // Trigger reflow to restart animation
        void preview.offsetWidth;
        preview.classList.add( 'preview-updating' );
      }

      // Debounced preview update (400ms)
      const debouncedPreviewUpdate = debounce( () =>
      {
        updatePreview();
        showUpdateIndicator();
      }, 400 );

      // Convert normalized coordinates (0-1) to SVG coordinates
      function normalizedToSvg ( x, y )
      {
        return {
          x: x * SVG_SIZE,
          y: SVG_SIZE - ( y * SVG_SIZE ) // Flip Y axis
        };
      }

      // Convert SVG coordinates to normalized coordinates
      function svgToNormalized ( svgX, svgY )
      {
        return {
          x: svgX / SVG_SIZE,
          y: 1 - ( svgY / SVG_SIZE ) // Flip Y axis back
        };
      }

      // Generate cubic bezier path
      function generateBezierPath ()
      {
        const p0 = { x: 0, y: 0 };  // Start at bottom-left
        const p3 = { x: 1, y: 1 };  // End at top-right
        const p1 = controlPoints[ 0 ];
        const p2 = controlPoints[ 1 ];

        const p0Svg = normalizedToSvg( p0.x, p0.y );
        const p1Svg = normalizedToSvg( p1.x, p1.y );
        const p2Svg = normalizedToSvg( p2.x, p2.y );
        const p3Svg = normalizedToSvg( p3.x, p3.y );

        return `M ${ p0Svg.x },${ p0Svg.y } C ${ p1Svg.x },${ p1Svg.y } ${ p2Svg.x },${ p2Svg.y } ${ p3Svg.x },${ p3Svg.y }`;
      }

      // Update SVG elements
      function updateSvg ()
      {
        const p0Svg = normalizedToSvg( 0, 0 );  // Bottom-left
        const p1Svg = normalizedToSvg( controlPoints[ 0 ].x, controlPoints[ 0 ].y );
        const p2Svg = normalizedToSvg( controlPoints[ 1 ].x, controlPoints[ 1 ].y );
        const p3Svg = normalizedToSvg( 1, 1 );  // Top-right

        // Update bezier curve
        document.getElementById( 'bezierCurve' ).setAttribute( 'd', generateBezierPath() );

        // Update tether lines
        document.getElementById( 'control-1-tether' ).setAttribute( 'points', `${ p0Svg.x },${ p0Svg.y } ${ p1Svg.x },${ p1Svg.y }` );
        document.getElementById( 'control-2-tether' ).setAttribute( 'points', `${ p3Svg.x },${ p3Svg.y } ${ p2Svg.x },${ p2Svg.y }` );

        // Update control points
        document.getElementById( 'control-1' ).setAttribute( 'cx', p1Svg.x );
        document.getElementById( 'control-1' ).setAttribute( 'cy', p1Svg.y );
        document.getElementById( 'control-1-hit' ).setAttribute( 'cx', p1Svg.x );
        document.getElementById( 'control-1-hit' ).setAttribute( 'cy', p1Svg.y );

        document.getElementById( 'control-2' ).setAttribute( 'cx', p2Svg.x );
        document.getElementById( 'control-2' ).setAttribute( 'cy', p2Svg.y );
        document.getElementById( 'control-2-hit' ).setAttribute( 'cx', p2Svg.x );
        document.getElementById( 'control-2-hit' ).setAttribute( 'cy', p2Svg.y );

        updateCSSOutput();
        debouncedPreviewUpdate();
      }

      function updateCSSOutput ()
      {
        const x1 = controlPoints[ 0 ].x.toFixed( 3 );
        const y1 = controlPoints[ 0 ].y.toFixed( 3 );
        const x2 = controlPoints[ 1 ].x.toFixed( 3 );
        const y2 = controlPoints[ 1 ].y.toFixed( 3 );
        const cubic = `${ duration.toFixed( 1 ) }s cubic-bezier(${ x1 }, ${ y1 }, ${ x2 }, ${ y2 })`;
        cssOutput.textContent = cubic;

        // Update point list
        pointList.innerHTML = `
          <div class="point-item">P1: (${ x1 }, ${ y1 })</div>
          <div class="point-item">P2: (${ x2 }, ${ y2 })</div>
        `;
      }

      function updatePreview ()
      {
        const x1 = parseFloat( controlPoints[ 0 ].x );
        const y1 = parseFloat( controlPoints[ 0 ].y );
        const x2 = parseFloat( controlPoints[ 1 ].x );
        const y2 = parseFloat( controlPoints[ 1 ].y );

        previewBox.style.animation = 'none';
        setTimeout( () =>
        {
          previewBox.style.animation = `slide ${ duration }s  cubic-bezier(${ x1 }, ${ y1 }, ${ x2 }, ${ y2 }) infinite`;
        }, 10 );
      }

      // SVG event handling - Setup hit areas with improved interaction
      const control1Hit = document.getElementById( 'control-1-hit' );
      const control2Hit = document.getElementById( 'control-2-hit' );
      const control1 = document.getElementById( 'control-1' );
      const control2 = document.getElementById( 'control-2' );

      let lastMouseX = 0;
      let lastMouseY = 0;

      function handleDragStart ( pointIndex, hitElement, pointElement )
      {
        return ( e ) =>
        {
          e.preventDefault();

          const clientX = e.clientX !== undefined ? e.clientX : e.touches[ 0 ].clientX;
          const clientY = e.clientY !== undefined ? e.clientY : e.touches[ 0 ].clientY;

          lastMouseX = clientX;
          lastMouseY = clientY;

          isDrawing = true;
          selectedPoint = pointIndex;
          svg.style.cursor = 'grabbing';
          hitElement.style.r = '45';
          pointElement.style.filter = 'brightness(1.5) drop-shadow(0 0 8px rgba(0, 168, 255, 0.8))';
        };
      }

      function handleDragMove ( e )
      {
        if ( !isDrawing || selectedPoint === -1 ) return;

        const clientX = e.clientX !== undefined ? e.clientX : e.touches?.[ 0 ]?.clientX;
        const clientY = e.clientY !== undefined ? e.clientY : e.touches?.[ 0 ]?.clientY;

        if ( clientX === undefined || clientY === undefined ) return;

        const rect = svg.getBoundingClientRect();

        // Calculate delta in screen pixels
        const deltaX = clientX - lastMouseX;
        const deltaY = clientY - lastMouseY;

        lastMouseX = clientX;
        lastMouseY = clientY;

        // Use consistent scaling for both axes (SVG viewBox is square)
        const scale = Math.min( rect.width, rect.height );

        // Convert delta to normalized delta with consistent scaling
        const deltaNormalizedX = ( deltaX / scale ) * ( SVG_SIZE / SVG_SIZE );
        const deltaNormalizedY = -( deltaY / scale ) * ( SVG_SIZE / SVG_SIZE ); // Flip Y axis

        // Apply delta to current position
        let newX = controlPoints[ selectedPoint ].x + deltaNormalizedX;
        let newY = controlPoints[ selectedPoint ].y + deltaNormalizedY;

        // Clamp values between 0 and 1
        newX = Math.max( 0, Math.min( 1, newX ) );
        newY = Math.max( 0, Math.min( 1, newY ) );

        controlPoints[ selectedPoint ].x = newX;
        controlPoints[ selectedPoint ].y = newY;

        updateSvg();
      }

      function handleDragEnd ( e )
      {
        if ( !isDrawing ) return;

        const hitElement = selectedPoint === 0 ? control1Hit : control2Hit;
        const pointElement = selectedPoint === 0 ? control1 : control2;

        isDrawing = false;
        selectedPoint = -1;
        svg.style.cursor = 'default';
        hitElement.style.r = '40';
        pointElement.style.filter = '';
      }

      // Use pointer events for best performance
      control1Hit.addEventListener( 'pointerdown', handleDragStart( 0, control1Hit, control1 ) );
      control2Hit.addEventListener( 'pointerdown', handleDragStart( 1, control2Hit, control2 ) );

      // Fallback events
      control1Hit.addEventListener( 'mousedown', handleDragStart( 0, control1Hit, control1 ) );
      control2Hit.addEventListener( 'mousedown', handleDragStart( 1, control2Hit, control2 ) );
      control1Hit.addEventListener( 'touchstart', handleDragStart( 0, control1Hit, control1 ) );
      control2Hit.addEventListener( 'touchstart', handleDragStart( 1, control2Hit, control2 ) );

      // Global move/end events with passive false for preventDefault
      document.addEventListener( 'pointermove', handleDragMove, false );
      document.addEventListener( 'pointerup', handleDragEnd, false );
      document.addEventListener( 'mousemove', handleDragMove, false );
      document.addEventListener( 'mouseup', handleDragEnd, false );
      document.addEventListener( 'touchmove', handleDragMove, false );
      document.addEventListener( 'touchend', handleDragEnd, false );

      // Duration slider event listener
      durationSlider.addEventListener( 'input', ( e ) =>
      {
        duration = parseFloat( e.target.value );
        durationValue.textContent = `${ duration.toFixed( 1 ) }s`;
        updateCSSOutput();
        debouncedPreviewUpdate();
      } );

      copyBtn.addEventListener( 'click', () =>
      {
        vscode.postMessage( {
          command: 'copyToClipboard',
          value: cssOutput.textContent
        } );
      } );

      resetBtn.addEventListener( 'click', () =>
      {
        duration = 1;
        durationSlider.value = 1;
        durationValue.textContent = '1s';
        controlPoints = [
          { x: 0, y: 0.5 }, // Point 1
          { x: 1, y: 0.5 }  // Point 2
        ];
        selectedPoint = -1;
        updateSvg();
      } );

      // Add animation for preview
      const style = document.createElement( 'style' );
      style.id = 'animation-styles';
      style.textContent = `
        @keyframes slide {
          from { margin-left: 10px; }
          to { margin-left: calc(100% - 40px); }
        }
      `;
      document.head.appendChild( style );

      // Dynamic keyframes style for spring
      let springKeyframesStyle = document.createElement( 'style' );
      springKeyframesStyle.id = 'spring-keyframes';
      document.head.appendChild( springKeyframesStyle );

      // Spring editor functionality
      const springCanvas = document.getElementById( 'springCanvas' );
      const springDuration = document.getElementById( 'springDuration' );
      const springDurationValue = document.getElementById( 'springDurationValue' );
      const stiffnessSlider = document.getElementById( 'stiffness' );
      const stiffnessValue = document.getElementById( 'stiffnessValue' );
      const dampingSlider = document.getElementById( 'damping' );
      const dampingValue = document.getElementById( 'dampingValue' );
      const massSlider = document.getElementById( 'mass' );
      const massValue = document.getElementById( 'massValue' );
      const springCssOutput = document.getElementById( 'springCssOutput' );
      const springCopyBtn = document.getElementById( 'springCopyBtn' );
      const springPreviewBox = document.getElementById( 'springPreviewBox' );

      let springParams = {
        duration: 1,
        stiffness: 170,
        damping: 26,
        mass: 1
      };

      let springPreviewUpdateTimeout;

      // Debounced spring preview update (300ms)
      const debouncedSpringPreviewUpdate = debounce( () =>
      {
        updateSpringPreview();
        showSpringUpdateIndicator();
      }, 300 );

      function showSpringUpdateIndicator ()
      {
        const preview = document.getElementById( 'springPreview' );
        preview.classList.remove( 'preview-updating' );
        // Trigger reflow to restart animation
        void preview.offsetWidth;
        preview.classList.add( 'preview-updating' );
      }

      // Professional spring physics engine using damped harmonic oscillator
      // This is the standard physics model used by React Spring, Framer Motion, etc.
      function generateSpringValue ( t, stiffness, damping, mass, duration )
      {
        if ( t <= 0 ) return 0;
        if ( t >= 1 ) return 1;

        // Normalize time to animation duration
        const normalizedTime = ( t * duration );

        // Angular frequency (natural frequency)
        // ω₀ = √(k/m)
        const omega0 = Math.sqrt( stiffness / mass );

        // Damping ratio
        // ζ (zeta) = c / (2√(km))
        const dampingRatio = damping / ( 2 * Math.sqrt( stiffness * mass ) );

        // If overdamped (ζ >= 1), no oscillation occurs
        if ( dampingRatio >= 1 )
        {
          const r1 = -omega0 * ( dampingRatio + Math.sqrt( dampingRatio * dampingRatio - 1 ) );
          return 1 - Math.exp( r1 * normalizedTime ) * ( 1 + r1 * normalizedTime );
        }

        // Damped frequency
        // ωd = ω₀√(1 - ζ²)
        const omegad = omega0 * Math.sqrt( Math.max( 0, 1 - dampingRatio * dampingRatio ) );

        // Displacement equation for underdamped system:
        // x(t) = 1 - e^(-ζω₀t)[cos(ωdt) + (ζω₀/ωd)sin(ωdt)]
        const exponentialDecay = Math.exp( -dampingRatio * omega0 * normalizedTime );

        if ( omegad === 0 )
        {
          return 1 - exponentialDecay * ( 1 + dampingRatio * omega0 * normalizedTime );
        }

        const cosTerm = Math.cos( omegad * normalizedTime );
        const sinTerm = ( dampingRatio * omega0 / omegad ) * Math.sin( omegad * normalizedTime );

        return 1 - exponentialDecay * ( cosTerm + sinTerm );
      }

      function generateSpringCurve ( stiffness, damping, mass, duration )
      {
        const points = [];
        const values = [];
        const timeStep = 0.005; // 200 samples per unit time for smoother curves

        // First pass: collect all values
        for ( let t = 0; t <= 1; t += timeStep )
        {
          const value = generateSpringValue( t, stiffness, damping, mass, duration );
          values.push( value );
        }

        // Find min and max values for scaling
        const minValue = Math.min( ...values );
        const maxValue = Math.max( ...values );

        // Determine scale based on actual oscillation range
        const range = maxValue - minValue;
        const topPadding = 20; // pixels
        const bottomPadding = 50; // pixels
        const canvasHeight = 300 - topPadding - bottomPadding;

        // Scale factor to fit all oscillations in canvas
        const scale = range > 0 ? canvasHeight / range : canvasHeight;

        // Reference points for scaling
        const minY = topPadding;
        const maxY = 300 - bottomPadding;

        // Second pass: create path with proper scaling
        for ( let i = 0; i < values.length; i++ )
        {
          const t = i * timeStep;
          const value = values[ i ];
          const x = t * 500;

          // Map value to canvas coordinates
          const svgY = maxY - ( ( value - minValue ) * scale );
          points.push( `${ x } ${ svgY }` );
        }

        return `M${ points.join( 'L' ) }`;
      }

      function updateSpringVisualization ()
      {
        const path = generateSpringCurve( springParams.stiffness, springParams.damping, springParams.mass, springParams.duration );
        document.getElementById( 'springPath' ).setAttribute( 'd', path );
      }

      function updateSpringOutput ()
      {
        const linearEasing = generateSpringLinearEasing( springParams.stiffness, springParams.damping, springParams.mass, springParams.duration );
        const durationMs = ( springParams.duration * 1000 ).toFixed( 0 );
        const css = `${ durationMs }ms linear(${ linearEasing })`;
        springCssOutput.textContent = css;
      }

      function generateSpringLinearEasing ( stiffness, damping, mass, duration )
      {
        const keyframes = [];
        const timeStep = 0.01; // Sample ~100 points
        const points = [];

        // Generate spring keyframes with proper physics
        for ( let t = 0; t <= 1; t += timeStep )
        {
          const value = generateSpringValue( t, stiffness, damping, mass, duration );
          points.push( { time: t, value } );
        }

        // Generate linear() easing string with time percentages
        for ( let i = 0; i < points.length; i++ )
        {
          const point = points[ i ];
          const percent = ( point.time * 100 ).toFixed( 1 );
          const value = point.value.toFixed( 4 );

          // Skip percentage for first point (0%) and last point (100%)
          if ( i === 0 )
          {
            keyframes.push( value );
          } else if ( i === points.length - 1 )
          {
            keyframes.push( '1' );
          } else
          {
            // Add percentage for all other points
            keyframes.push( `${ value } ${ percent }%` );
          }
        }

        return keyframes.join( ', ' );
      }

      function updateSpringPreview ()
      {
        const linearEasing = generateSpringLinearEasing( springParams.stiffness, springParams.damping, springParams.mass, springParams.duration );

        springPreviewBox.style.animation = 'none';
        springPreviewBox.style.marginLeft = '10px';

        setTimeout( () =>
        {
          const easing = `linear(${ linearEasing })`;
          springPreviewBox.style.animation = `slide ${ springParams.duration }s ${ easing } forwards`;
        }, 10 );
      }

      springDuration.addEventListener( 'input', ( e ) =>
      {
        springParams.duration = parseFloat( e.target.value );
        springDurationValue.textContent = `${ springParams.duration.toFixed( 1 ) }s`;
        updateSpringVisualization();
        updateSpringOutput();
        debouncedSpringPreviewUpdate();
      } );

      stiffnessSlider.addEventListener( 'input', ( e ) =>
      {
        springParams.stiffness = parseFloat( e.target.value );
        stiffnessValue.textContent = springParams.stiffness.toFixed( 0 );
        updateSpringVisualization();
        updateSpringOutput();
        debouncedSpringPreviewUpdate();
      } );

      dampingSlider.addEventListener( 'input', ( e ) =>
      {
        springParams.damping = parseFloat( e.target.value );
        dampingValue.textContent = springParams.damping.toFixed( 0 );
        updateSpringVisualization();
        updateSpringOutput();
        debouncedSpringPreviewUpdate();
      } );

      massSlider.addEventListener( 'input', ( e ) =>
      {
        springParams.mass = parseFloat( e.target.value );
        massValue.textContent = springParams.mass.toFixed( 1 );
        updateSpringVisualization();
        updateSpringOutput();
        debouncedSpringPreviewUpdate();
      } );

      springCopyBtn.addEventListener( 'click', () =>
      {
        vscode.postMessage( {
          command: 'copyToClipboard',
          value: springCssOutput.textContent
        } );
      } );

      // Initial spring visualization
      updateSpringVisualization();
      updateSpringOutput();

      // Initial SVG update
      updateSvg();
    </script>
  </body>

</html>
