<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Ease Generator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
        overflow: hidden;
        height: 100vh;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 20px;
        gap: 20px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 22px;
        font-weight: 600;
      }

      .controls {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 8px 16px;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.2s;
      }

      button:hover {
        background: var(--vscode-button-hoverBackground);
      }

      .editor-section {
        display: flex;
        gap: 20px;
        flex: 1;
        min-height: 0;
      }

      .canvas-wrapper {
        flex: 2;
        display: flex;
        flex-direction: column;
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-input-border);
        border-radius: 4px;
        padding: 10px;
      }

      canvas {
        flex: 1;
        border: 1px solid var(--vscode-input-border);
        border-radius: 2px;
        cursor: crosshair;
        background: white;
      }

      .output-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-input-border);
        border-radius: 4px;
        padding: 15px;
      }

      .output-section h3 {
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 600;
      }

      .code-block {
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-input-border);
        border-radius: 2px;
        padding: 10px;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 12px;
        word-break: break-all;
        color: var(--vscode-symbolIcon-colorForeground);
        margin-bottom: 10px;
      }

      .copy-btn {
        width: 100%;
      }

      .info-text {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
        line-height: 1.5;
      }

      .point-list {
        margin-top: 10px;
        font-size: 12px;
        max-height: 150px;
        overflow-y: auto;
      }

      .point-item {
        padding: 4px;
        background: var(--vscode-editor-background);
        margin-bottom: 4px;
        border-radius: 2px;
        font-family: monospace;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>CSS Ease Generator</h1>
        <div class="controls">
          <button id="resetBtn">Reset Curve</button>
        </div>
      </div>

      <div class="editor-section">
        <div class="canvas-wrapper">
          <small style="margin-bottom: 8px; color: var(--vscode-descriptionForeground);">Draw your easing curve on the
            canvas</small>
          <canvas id="easeCanvas"></canvas>
        </div>

        <div class="output-section">
          <h3>CSS Output</h3>
          <div class="code-block" id="cssOutput">cubic-bezier(0.25, 0.1, 0.25, 1.0)</div>
          <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>

          <h3 style="margin-top: 15px;">Preview</h3>
          <div id="preview" style="
					width: 100%;
					height: 60px;
					background: var(--vscode-editor-background);
					border: 1px solid var(--vscode-input-border);
					border-radius: 2px;
					display: flex;
					align-items: center;
					overflow: hidden;
				">
            <div id="previewBox" style="
						width: 30px;
						height: 30px;
						background: var(--vscode-symbolIcon-colorForeground);
						margin-left: 10px;
						border-radius: 2px;
					"></div>
          </div>

          <h3 style="margin-top: 15px;">Control Points</h3>
          <div class="point-list" id="pointList"></div>
        </div>
      </div>
    </div>

    <script>
      const vscode = acquireVsCodeApi();
      const canvas = document.getElementById( 'easeCanvas' );
      const ctx = canvas.getContext( '2d' );
      const cssOutput = document.getElementById( 'cssOutput' );
      const copyBtn = document.getElementById( 'copyBtn' );
      const resetBtn = document.getElementById( 'resetBtn' );
      const pointList = document.getElementById( 'pointList' );
      const previewBox = document.getElementById( 'previewBox' );
      // Default control points for cubic-bezier
      let controlPoints = [ {
        x: 0.25,
        y: 0.9
      }, // Point 1
      {
        x: 0.75,
        y: 0.1
      } // Point 2
      ];
      let isDrawing = false;
      let selectedPoint = -1;
      const pointRadius = 8;

      function resizeCanvas ()
      {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width - 20;
        canvas.height = rect.height - 30;
      }

      function drawCurve ()
      {
        ctx.clearRect( 0, 0, canvas.width, canvas.height );
        ctx.strokeStyle = '#888';
        ctx.fillStyle = 'rgba(100, 150, 200, 0.1)';
        ctx.lineWidth = 0.5;
        // Draw grid
        for ( let i = 0; i <= 10; i++ )
        {
          const x = ( canvas.width / 10 ) * i;
          const y = ( canvas.height / 10 ) * i;
          ctx.fillRect( x - 0.5, y - 0.5, 1, 1 );
        }
        // Draw axes
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo( 0, canvas.height );
        ctx.lineTo( canvas.width, canvas.height );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo( 0, 0 );
        ctx.lineTo( 0, canvas.height );
        ctx.stroke();
        // Draw cubic bezier curve
        ctx.strokeStyle = '#00a8ff';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        const p0 = {
          x: 0,
          y: 0
        };
        const p3 = {
          x: 1,
          y: 1
        };
        const p1 = controlPoints[ 0 ];
        const p2 = controlPoints[ 1 ];
        ctx.moveTo( p0.x * canvas.width, canvas.height - p0.y * canvas.height );
        for ( let t = 0; t <= 1; t += 0.01 )
        {
          const x = Math.pow( 1 - t, 3 ) * p0.x +
            3 * Math.pow( 1 - t, 2 ) * t * p1.x +
            3 * ( 1 - t ) * Math.pow( t, 2 ) * p2.x +
            Math.pow( t, 3 ) * p3.x;
          const y = Math.pow( 1 - t, 3 ) * p0.y +
            3 * Math.pow( 1 - t, 2 ) * t * p1.y +
            3 * ( 1 - t ) * Math.pow( t, 2 ) * p2.y +
            Math.pow( t, 3 ) * p3.y;
          ctx.lineTo( x * canvas.width, canvas.height - y * canvas.height );
        }
        ctx.stroke();
        // Draw control lines
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.setLineDash( [ 5, 5 ] );
        ctx.beginPath();
        ctx.moveTo( 0, canvas.height );
        ctx.lineTo( p1.x * canvas.width, canvas.height - p1.y * canvas.height );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo( canvas.width, 0 );
        ctx.lineTo( p2.x * canvas.width, canvas.height - p2.y * canvas.height );
        ctx.stroke();
        ctx.setLineDash( [] );
        // Draw control points
        controlPoints.forEach( ( point, index ) =>
        {
          ctx.fillStyle = selectedPoint === index ? '#ff6b6b' : '#00a8ff';
          ctx.beginPath();
          ctx.arc(
            point.x * canvas.width,
            canvas.height - point.y * canvas.height,
            pointRadius,
            0,
            Math.PI * 2
          );
          ctx.fill();
          // Draw outline
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.stroke();
        } );
        updateCSSOutput();
        updatePreview();
      }

      function updateCSSOutput ()
      {
        const x1 = controlPoints[ 0 ].x.toFixed( 3 );
        const y1 = controlPoints[ 0 ].y.toFixed( 3 );
        const x2 = controlPoints[ 1 ].x.toFixed( 3 );
        const y2 = controlPoints[ 1 ].y.toFixed( 3 );
        const cubic = `cubic-bezier(${ x1 }, ${ y1 }, ${ x2 }, ${ y2 })`;
        cssOutput.textContent = cubic;

        // Update point list
        pointList.innerHTML = `
          <div class="point-item">P1: (${ x1 }, ${ y1 })</div>
          <div class="point-item">P2: (${ x2 }, ${ y2 })</div>
        `;
      }

      function updatePreview ()
      {
        const x1 = parseFloat( controlPoints[ 0 ].x );
        const y1 = parseFloat( controlPoints[ 0 ].y );
        const x2 = parseFloat( controlPoints[ 1 ].x );
        const y2 = parseFloat( controlPoints[ 1 ].y );

        previewBox.style.animation = 'none';
        setTimeout( () =>
        {
          previewBox.style.animation = `slide 2s cubic-bezier(${ x1 }, ${ y1 }, ${ x2 }, ${ y2 }) infinite`;
        }, 10 );
      }

      canvas.addEventListener( 'mousedown', ( e ) =>
      {
        const rect = canvas.getBoundingClientRect();
        const x = ( e.clientX - rect.left ) / rect.width;
        const y = 1 - ( e.clientY - rect.top ) / rect.height;

        // Check if clicking on a control point
        for ( let i = 0; i < controlPoints.length; i++ )
        {
          const dx = ( controlPoints[ i ].x * rect.width ) / rect.width - x;
          const dy = ( controlPoints[ i ].y * rect.height ) / rect.height - y;
          const distance = Math.sqrt( dx * dx + dy * dy );

          if ( distance < pointRadius / Math.min( rect.width, rect.height ) )
          {
            selectedPoint = i;
            isDrawing = true;
            drawCurve();
            return;
          }
        }
      } );

      canvas.addEventListener( 'mousemove', ( e ) =>
      {
        if ( !isDrawing || selectedPoint === -1 ) return;

        const rect = canvas.getBoundingClientRect();
        let x = ( e.clientX - rect.left ) / rect.width;
        let y = 1 - ( e.clientY - rect.top ) / rect.height;

        // Clamp values between 0 and 1
        x = Math.max( 0, Math.min( 1, x ) );
        y = Math.max( 0, Math.min( 1, y ) );

        controlPoints[ selectedPoint ] = { x, y };
        drawCurve();
      } );

      canvas.addEventListener( 'mouseup', () =>
      {
        isDrawing = false;
        selectedPoint = -1;
        drawCurve();
      } );

      canvas.addEventListener( 'mouseleave', () =>
      {
        isDrawing = false;
        selectedPoint = -1;
        drawCurve();
      } );

      copyBtn.addEventListener( 'click', () =>
      {
        vscode.postMessage( {
          command: 'copyToClipboard',
          value: cssOutput.textContent
        } );
      } );

      resetBtn.addEventListener( 'click', () =>
      {
        controlPoints = [
          { x: 0.25, y: 0.9 },
          { x: 0.75, y: 0.1 }
        ];
        selectedPoint = -1;
        drawCurve();
      } );

      // Add animation for preview
      const style = document.createElement( 'style' );
      style.textContent = `
        @keyframes slide {
          from { margin-left: 10px; }
          to { margin-left: calc(100% - 40px); }
        }
      `;
      document.head.appendChild( style );

      // Initial setup
      window.addEventListener( 'resize', () =>
      {
        resizeCanvas();
        drawCurve();
      } );

      resizeCanvas();
      drawCurve();
    </script>
  </body>

</html>
